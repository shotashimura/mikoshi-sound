<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>神輿</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #start-screen .kanji {
      font-size: 5rem; color: rgba(255,220,100,0.85); font-family: serif;
    }
    #start-screen .hint {
      font-size: 0.8rem; color: rgba(255,220,100,0.3);
      font-family: sans-serif; letter-spacing: 0.35em;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
    #analysis-canvas, #capture-canvas { display: none; }
  </style>
</head>
<body>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="analysis-canvas" width="80"  height="60"></canvas>
  <canvas id="capture-canvas"  width="320" height="240"></canvas>

  <div id="start-screen">
    <div class="kanji">神輿</div>
    <div class="hint">タップして開始</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  G メジャースケール + コード辞書 (Oasis アンセム仕様)
  //  進行: G - D - Em - Cadd9 (I-V-vi-IV、Wonderwall 系)
  //  各コードに voicing(ストローク用)・bassNotes(ベース歩き用)・lead(リード音域) を持たせる。
  // ============================================================
  const G_MAJ = [
     49.00,  55.00,  61.74,  65.41,  73.42,  82.41,  92.50,    // G1 A1 B1 C2 D2 E2 F#2
     98.00, 110.00, 123.47, 130.81, 146.83, 164.81, 184.997,   // G2 A2 B2 C3 D3 E3 F#3
    196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 369.99,    // G3 A3 B3 C4 D4 E4 F#4
    392.00, 440.00, 493.88, 523.25, 587.33, 659.26, 739.99,    // G4 A4 B4 C5 D5 E5 F#5
    783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1479.98,// G5 A5 B5 C6 D6 E6 F#6
  ];

  const CHORDS = {
    G: {
      bassNotes: [49.00, 73.42, 98.00, 123.47],
      voicing:   [196.00, 246.94, 293.66, 392.00, 493.88],
      lead:      [329.63, 392.00, 440.00, 493.88, 587.33, 659.26],
    },
    D: {
      bassNotes: [73.42, 110.00, 146.83, 184.997],
      voicing:   [146.83, 184.997, 220.00, 293.66, 369.99],
      lead:      [369.99, 440.00, 493.88, 587.33, 659.26, 739.99],
    },
    Em: {
      bassNotes: [82.41, 123.47, 164.81, 196.00],
      voicing:   [164.81, 196.00, 246.94, 329.63, 392.00],
      lead:      [329.63, 392.00, 440.00, 493.88, 587.33, 659.26],
    },
    Cadd9: {
      bassNotes: [65.41, 98.00, 130.81, 164.81],
      voicing:   [130.81, 164.81, 196.00, 261.63, 293.66],
      lead:      [329.63, 392.00, 440.00, 493.88, 523.25, 659.26],
    },
    Am: {
      bassNotes: [55.00, 82.41, 110.00, 130.81],                 // A1 E2 A2 C3
      voicing:   [110.00, 130.81, 164.81, 220.00, 261.63],       // A2 C3 E3 A3 C4
      lead:      [329.63, 392.00, 440.00, 493.88, 523.25, 659.26], // E4 G4 A4 B4 C5 E5
    },
    F: {
      bassNotes: [43.65, 65.41, 87.31, 110.00],                  // F1 C2 F2 A2
      voicing:   [87.31, 130.81, 174.61, 220.00, 261.63],        // F2 C3 F3 A3 C4
      lead:      [349.23, 440.00, 523.25, 587.33, 659.26, 698.46], // F4 A4 C5 D5 E5 F5
    },
    C: {
      bassNotes: [65.41, 98.00, 130.81, 164.81],
      voicing:   [130.81, 164.81, 196.00, 261.63, 329.63],
      lead:      [329.63, 392.00, 440.00, 493.88, 523.25, 659.26],
    },
  };

  // ─── SONGS: 4 曲を 3:30 ごとに循環 (Oasis アンセム集) ───
  const SONGS = [
    { name: 'Wonderwall',     progression: ['G','D','Em','Cadd9'], tonic: 49.00, bpmBase:  87, drive: 28 },
    { name: 'Live Forever',   progression: ['G','D','Am','C'],     tonic: 49.00, bpmBase: 110, drive: 35 },
    { name: 'Anger',          progression: ['C','G','Am','F'],     tonic: 65.41, bpmBase:  82, drive: 22 },
    { name: 'RocknRoll Star', progression: ['G','F','G','F'],      tonic: 49.00, bpmBase: 120, drive: 45 },
  ];
  const SONG_DURATION_MS = 210000;   // 3:30 per song

  // ─── 現在再生中の曲の状態 (サーバー指揮、socket 'song_change' で更新) ───
  let _activeSongIdx     = 0;
  let _activeProgression = SONGS[0].progression;
  let _activeBpmBase     = SONGS[0].bpmBase;
  let _activeDrive       = SONGS[0].drive;
  // 音声初期化前にサーバーから届いた曲番号を保留しておく
  let _pendingSongIdx    = 0;

  // ============================================================
  //  センサー状態
  // ============================================================
  const S = {
    brightness: 0.5, whiteRatio: 0.3, colorTemp: 0.5,
    accMag: 0, accX: 0, accY: 0, mic: 0,
  };
  let voiceIndex    = 0;
  let audienceCount = 0;
  let cameraStream  = null;
  let audioReady    = false;

  // Web Audio API グローバル
  let audioCtx     = null;
  let granularDest = null;  // MediaStreamDestinationNode → WebRTC audio track
  let granEngine   = null;  // GranularEngine instance
  let _audioRefs   = null;  // instrument bus refs for updateLoop / sidechain
  let micAnalyser  = null;
  let micBuf       = null;

  // ─── サイドチェインダッキング ───
  // キックのタイミングで guitarDuck / bassDuck を一瞬下げて
  // ロックフェスらしい「ドゥン!」のうねりを出す。
  function duckSidechain(amount = 0.45, recoverMs = 180) {
    if (!audioCtx || !_audioRefs) return;
    const t = audioCtx.currentTime;
    [_audioRefs.guitarDuck, _audioRefs.bassDuck, _audioRefs.padDuck].forEach((g) => {
      if (!g) return;
      g.gain.cancelScheduledValues(t);
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.linearRampToValueAtTime(amount, t + 0.010);
      g.gain.linearRampToValueAtTime(1.0,    t + recoverMs / 1000);
    });
  }

  // ============================================================
  //  WebRTC: broadcaster（担ぎ手→観客へ映像＋グラニュラー音声）
  // ============================================================
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ],
  };
  const peerConns = new Map();  // viewerId → RTCPeerConnection

  async function createPeerForViewer(viewerId) {
    if (peerConns.has(viewerId)) peerConns.get(viewerId).close();

    const pc = new RTCPeerConnection(ICE_CONFIG);
    peerConns.set(viewerId, pc);

    // 映像トラック
    if (cameraStream) {
      cameraStream.getVideoTracks().forEach((t) => pc.addTrack(t, cameraStream));
    }

    // Pillar 2: グラニュラー音声トラック
    if (granularDest) {
      const at = granularDest.stream.getAudioTracks()[0];
      if (at) pc.addTrack(at, granularDest.stream);
    }

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice', { to: viewerId, ice: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      console.log(`[PC ${viewerId.slice(-4)}] ${pc.connectionState}`);
      if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
        peerConns.delete(viewerId);
      }
    };

    const offer = await pc.createOffer({ offerToReceiveVideo: false, offerToReceiveAudio: false });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: viewerId, offer });
  }

  // ============================================================
  //  Socket.io
  // ============================================================
  const socket = io({ transports: ['websocket'] });

  socket.on('joined_mikoshi', (d) => { voiceIndex = d.voiceIndex; });

  // サーバーが曲を切り替えたら追従 (新規接続時にも現在の曲が即届く)
  socket.on('song_change', ({ songIdx }) => {
    const idx = ((songIdx % SONGS.length) + SONGS.length) % SONGS.length;
    _pendingSongIdx = idx;
    if (audioCtx && _audioRefs) applySong(idx);
  });

  socket.on('world_state', (s) => {
    audienceCount = s.audienceCount;
    if (audioReady) applyWorldToAudio(s);
  });

  socket.on('viewer_request', async ({ viewerId }) => {
    if (!cameraStream) return;
    await createPeerForViewer(viewerId);
  });

  socket.on('answer', async ({ from, answer }) => {
    const pc = peerConns.get(from);
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('ice', ({ from, ice }) => {
    const pc = peerConns.get(from);
    if (pc && ice) pc.addIceCandidate(new RTCIceCandidate(ice)).catch(() => {});
  });

  setInterval(() => {
    if (!audioReady) return;
    socket.emit('sensor_data', {
      brightness: S.brightness, whiteRatio: S.whiteRatio,
      colorTemp: S.colorTemp, accMagnitude: S.accMag,
      accX: S.accX, accY: S.accY, micLevel: S.mic,
    });
  }, 150);

  // ============================================================
  //  タップで開始
  // ============================================================
  document.getElementById('start-screen').addEventListener('pointerdown', async () => {
    document.getElementById('start-screen').remove();
    socket.emit('join_mikoshi');
    await initCamera();
    await initAudio();   // マイクもここで取得
    await initMotion();
    audioReady = true;
  }, { once: true });

  // ============================================================
  //  カメラ
  // ============================================================
  const camEl  = document.getElementById('cam');
  const anvCtx = document.getElementById('analysis-canvas')
                   .getContext('2d', { willReadFrequently: true });

  async function initCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      camEl.srcObject = cameraStream;
      await new Promise((r) => { camEl.onloadedmetadata = r; });
    } catch (e) { console.warn('[camera]', e); }
  }

  function analyzeFrame() {
    if (!camEl.videoWidth) return;
    anvCtx.drawImage(camEl, 0, 0, 80, 60);
    const px = anvCtx.getImageData(0, 0, 80, 60).data;
    const n  = px.length / 4;
    let lum = 0, white = 0, rSum = 0, bSum = 0;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      lum  += 0.2126*r + 0.7152*g + 0.0722*b;
      if (r > 200 && g > 200 && b > 200) white++;
      rSum += r; bSum += b;
    }
    S.brightness = lerp(S.brightness, lum / (n * 255),    0.07);
    S.whiteRatio = lerp(S.whiteRatio, white / n,           0.07);
    S.colorTemp  = lerp(S.colorTemp,  rSum/(rSum+bSum+1), 0.05);
  }

  // ============================================================
  //  加速度センサー
  // ============================================================
  const peakCBs = [];
  function onPeak(fn) { peakCBs.push(fn); }

  async function initMotion() {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try { await DeviceMotionEvent.requestPermission(); } catch (_) {}
    }
    let prevMag = 0, lastPeak = 0;
    window.addEventListener('devicemotion', (e) => {
      const g = e.accelerationIncludingGravity;
      if (!g) return;
      const { x = 0, y = 0, z = 0 } = g;
      const rel = Math.max(Math.sqrt(x*x + y*y + z*z) - 9.8, 0);
      S.accX   = x / 10; S.accY = y / 10;
      S.accMag = lerp(S.accMag, Math.min(rel / 8, 1), 0.15);
      const now = performance.now();
      if (rel > 2.0 && prevMag <= rel && now - lastPeak > 250) {
        lastPeak = now;
        peakCBs.forEach((fn) => fn(rel));
      }
      prevMag = rel;
    });
  }

  // ============================================================
  //  Pillar 1: グラニュラーエンジン（AudioWorklet 版）
  //
  //  優先順位:
  //   1. SharedArrayBuffer + AudioWorklet — 生 PCM をリングバッファに直書き
  //      (COOP/COEP ヘッダーが設定されている場合のみ利用可能)
  //   2. postMessage + AudioWorklet     — コーデック圧縮なし Float32 転送
  //   3. MediaRecorder                  — 最終フォールバック（opus 圧縮あり）
  //
  //  リングバッファ仕様:
  //   RING_SIZE = 2^18 = 262144 サンプル (48kHz で約5.5秒)
  //   ctrl[0] = writePos, ctrl[1] = hasWrapped(0/1)
  // ============================================================
  class GranularEngine {
    constructor(ctx, outputNode) {
      this.ctx    = ctx;
      this.output = outputNode;
      this.pitch  = 1.0;
      this.spread = 0.7;
      this.density = 80;   // ms/grain (センサーで変調)
      this.running = false;

      // Mode A: SharedArrayBuffer リングバッファ
      this.RING_SIZE  = 1 << 18;   // 262144 サンプル
      this.ringBuffer = null;      // SharedArrayBuffer (Int16)
      this.ctrlBuffer = null;      // SharedArrayBuffer (Int32[4])
      this.ringData   = null;
      this.ctrlData   = null;
      this.useShared  = false;

      // Mode B / C: PCM バッファ配列
      this.pcmBuffers = [];
      this.maxPCMBufs = 10;
    }

    async start(micStream) {
      this.running = true;
      const hasShared = typeof SharedArrayBuffer !== 'undefined';

      try {
        await this.ctx.audioWorklet.addModule('/worklet/mic-capture.js');
        const micSrc     = this.ctx.createMediaStreamSource(micStream);
        const captureNode = new AudioWorkletNode(this.ctx, 'mic-capture-processor');

        if (hasShared) {
          // ── Mode A: SharedArrayBuffer ──────────────────────
          this.ringBuffer = new SharedArrayBuffer(this.RING_SIZE * 2); // Int16
          this.ctrlBuffer = new SharedArrayBuffer(16);                 // Int32[4]
          this.ringData   = new Int16Array(this.ringBuffer);
          this.ctrlData   = new Int32Array(this.ctrlBuffer);

          captureNode.port.postMessage({
            type: 'init-shared',
            ring: this.ringBuffer,
            ctrl: this.ctrlBuffer,
          });
          this.useShared = true;
          console.log('[granular] Mode A: SharedArrayBuffer リングバッファ');

        } else {
          // ── Mode B: postMessage フォールバック ──────────────
          captureNode.port.postMessage({ type: 'init-pm' });
          captureNode.port.onmessage = ({ data }) => {
            if (data.type !== 'pcm') return;
            try {
              const sr      = this.ctx.sampleRate;
              const float32 = new Float32Array(data.buffer);
              const buf     = this.ctx.createBuffer(1, float32.length, sr);
              buf.copyToChannel(float32, 0);
              this.pcmBuffers.push(buf);
              if (this.pcmBuffers.length > this.maxPCMBufs) this.pcmBuffers.shift();
            } catch (_) {}
          };
          console.log('[granular] Mode B: postMessage PCM 転送');
        }

        // ワークレットを audio graph に保持するためサイレンサーに接続
        const silencer = this.ctx.createGain();
        silencer.gain.value = 0;
        micSrc.connect(captureNode);
        captureNode.connect(silencer);
        silencer.connect(this.ctx.destination);

      } catch (e) {
        console.warn('[granular] AudioWorklet 失敗 → MediaRecorder フォールバック:', e);
        this._startMediaRecorder(micStream);
      }

      this._grainLoop();
    }

    stop() { this.running = false; }

    // ── Mode A: SharedArrayBuffer から粒子を再生 ───────────
    _playGrainShared() {
      const wPos       = Atomics.load(this.ctrlData, 0);
      const hasWrapped = Atomics.load(this.ctrlData, 1);
      const RING       = this.RING_SIZE;
      const sr         = this.ctx.sampleRate;

      const validSamples  = hasWrapped ? RING : wPos;
      const durSamples    = Math.floor(sr * (0.055 + Math.random() * 0.13));
      const safeZone      = Math.floor(sr * 0.08);  // 直近 80ms は書き込み中の可能性があるので除外
      const maxLookback   = Math.min(validSamples - safeZone - durSamples,
                                     Math.floor(sr * 4.5));

      if (maxLookback < durSamples) return; // バッファがまだ十分に溜まっていない

      const lookback   = safeZone + durSamples + Math.floor(Math.random() * (maxLookback - durSamples));
      const grainStart = ((wPos - lookback) % RING + RING) % RING;

      // リングバッファから AudioBuffer を生成（Int16 → float32）
      const buf  = this.ctx.createBuffer(1, durSamples, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < durSamples; i++) {
        data[i] = this.ringData[(grainStart + i) % RING] / 32767;
      }
      this._scheduleGrain(buf, 0, durSamples / sr);
    }

    // ── Mode B / C: AudioBuffer 配列から粒子を再生 ─────────
    _playGrainBuffer() {
      if (!this.pcmBuffers.length) return;
      const buf = this.pcmBuffers[Math.floor(Math.random() * this.pcmBuffers.length)];
      if (!buf || buf.duration < 0.04) return;

      const sr         = this.ctx.sampleRate;
      const grainDur   = 0.055 + Math.random() * 0.13;
      const maxStart   = Math.max(0, buf.duration - grainDur);
      const startSec   = Math.random() * maxStart;
      this._scheduleGrain(buf, startSec, grainDur);
    }

    // ── 粒子スケジューラ共通処理（Hanning エンベロープ＋パン）─
    _scheduleGrain(buf, startSec, durSec) {
      const now = this.ctx.currentTime;
      const src = this.ctx.createBufferSource();
      src.buffer             = buf;
      src.playbackRate.value = this.pitch * (0.83 + Math.random() * 0.34);

      const env = this.ctx.createGain();
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.42, now + durSec * 0.15);
      env.gain.setValueAtTime(0.42,          now + durSec * 0.85);
      env.gain.linearRampToValueAtTime(0,    now + durSec);

      const pan = this.ctx.createStereoPanner();
      pan.pan.value = (Math.random() - 0.5) * this.spread;

      src.connect(env); env.connect(pan); pan.connect(this.output);
      src.start(now, startSec, durSec + 0.01);
    }

    _playGrain() {
      if (this.useShared)          this._playGrainShared();
      else if (this.pcmBuffers.length) this._playGrainBuffer();
    }

    _grainLoop() {
      const tick = () => {
        if (!this.running) return;
        this._playGrain();
        setTimeout(tick, this.density * (0.5 + Math.random()));
      };
      tick();
    }

    // ── Mode C: MediaRecorder 最終フォールバック ────────────
    _startMediaRecorder(stream) {
      const doCapture = () => {
        if (!this.running) return;
        let mimeType = '';
        for (const m of ['audio/webm;codecs=opus', 'audio/webm', '']) {
          if (!m || MediaRecorder.isTypeSupported(m)) { mimeType = m; break; }
        }
        try {
          const mr     = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          const chunks = [];
          mr.ondataavailable = (e) => { if (e.data?.size > 0) chunks.push(e.data); };
          mr.onstop = async () => {
            try {
              const blob    = new Blob(chunks, { type: mr.mimeType || 'audio/webm' });
              const decoded = await this.ctx.decodeAudioData(await blob.arrayBuffer());
              if (decoded?.duration > 0.04) {
                this.pcmBuffers.push(decoded);
                if (this.pcmBuffers.length > 6) this.pcmBuffers.shift();
              }
            } catch (_) {}
            if (this.running) setTimeout(doCapture, 50);
          };
          mr.start();
          setTimeout(() => { try { if (mr.state === 'recording') mr.stop(); } catch (_) {} }, 600);
        } catch (e) {
          setTimeout(() => { if (this.running) doCapture(); }, 1200);
        }
      };
      doCapture();
    }
  }

  // ============================================================
  //  テンポ検出器
  //  加速度センサーのピーク時刻を蓄積し、打ち間隔の中央値から
  //  担ぎ手の「おおよそのテンポ」を推定する。
  //
  //  設計方針:
  //   - 直近 8 ピークの間隔を記録
  //   - 外れ値除去（中央値の 0.4〜2.5 倍の範囲外は棄却）
  //   - 新しいピークほど重みを大きくした加重平均でテンポを平滑化
  //   - CV（変動係数）でテンポの一貫性を 0-1 の confidence として表現
  //   - ピークが途絶えると confidence が時間減衰する
  //   - getFueInterval(): テンポ×フレーズ長(1–3 拍) + ±15% 人間的ゆらぎ
  // ============================================================
  class TempoDetector {
    constructor() {
      this.times      = [];      // 直近ピーク時刻(ms)の circular buffer
      this.maxPeaks   = 8;
      this.tempoMs    = 1000;    // 現在の推定テンポ間隔(ms)
      this.confidence = 0;       // 0-1: テンポの一貫性
      this.lastPeak   = 0;       // 最後にピークを受けた時刻
      // 許容テンポ範囲
      this.MIN_INTERVAL = 220;   // ~270 BPM
      this.MAX_INTERVAL = 2800;  // ~21 BPM
    }

    addPeak(timestamp) {
      // 短すぎる間隔のピークは無視（センサーノイズ対策）
      if (this.lastPeak && timestamp - this.lastPeak < this.MIN_INTERVAL) return;
      this.lastPeak = timestamp;
      this.times.push(timestamp);
      if (this.times.length > this.maxPeaks) this.times.shift();
      this._update();
    }

    _update() {
      if (this.times.length < 3) return;

      // 連続ピーク間の間隔を計算
      const intervals = [];
      for (let i = 1; i < this.times.length; i++) {
        const d = this.times[i] - this.times[i - 1];
        if (d >= this.MIN_INTERVAL && d <= this.MAX_INTERVAL) intervals.push(d);
      }
      if (intervals.length < 2) return;

      // 中央値を基準に外れ値除去（拍落ちや二重打ちを弾く）
      const sorted = [...intervals].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const valid  = intervals.filter(d => d >= median * 0.40 && d <= median * 2.50);
      if (valid.length < 2) return;

      // 新しいほど高い重みで加重平均
      let wSum = 0, wAvg = 0;
      valid.forEach((d, i) => {
        const w = i + 1;
        wAvg += d * w; wSum += w;
      });
      const estimate = wAvg / wSum;

      // テンポをゆっくり更新（急激な変化を抑制）
      this.tempoMs = this.tempoMs * 0.65 + estimate * 0.35;

      // confidence = 間隔の安定度（CV が小さいほど高い）
      const mean  = valid.reduce((s, d) => s + d, 0) / valid.length;
      const variance = valid.reduce((s, d) => s + (d - mean) ** 2, 0) / valid.length;
      const cv    = Math.sqrt(variance) / mean;   // 0 = 完全均一, >0.3 = バラバラ
      this.confidence = Math.max(0, Math.min(1, 1 - cv * 3.2));
    }

    // テンポ信頼度（ピークが途絶えると減衰）
    effectiveConfidence() {
      const elapsed = performance.now() - this.lastPeak;
      const decay   = Math.max(0, 1 - elapsed / (this.tempoMs * 4));
      return this.confidence * decay;
    }

    // 笛フレーズの次の間隔(ms)を返す
    // ── テンポ × フレーズ拍数 × 人間的ゆらぎ ──
    getFueInterval(accMag) {
      const conf = this.effectiveConfidence();

      // テンポベースの間隔（1〜3 拍ぶん）
      const beats        = 1 + Math.random() * 2;
      const tempoInterval = this.tempoMs * beats;

      // フォールバック（テンポ未確立時は accMag ベース）
      const fallback     = Math.max(350, 1300 / (0.5 + accMag * 1.5));

      // confidence でブレンド
      const base = conf > 0.25
        ? tempoInterval * conf + fallback * (1 - conf)
        : fallback;

      // ±15% 人間的ゆらぎ（打ちのユラギがそのまま音楽性に）
      const jitter = 0.85 + Math.random() * 0.30;
      return Math.max(240, base * jitter);
    }

    getBPM() { return 60000 / this.tempoMs; }
  }

  const tempoDetector = new TempoDetector();

  // ============================================================
  //  Pillar 3: ピュア Web Audio API ロックキット (ドラム・ベース・ギター)
  // ============================================================

  // 合成インパルスレスポンスによるコンボリューションリバーブ
  function createConvReverb(ctx, duration, decay) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const ir  = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / (decay * 0.38));
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = ir;
    return conv;
  }

  // ─── ディストーション波形カーブ ───
  // amount が大きいほどクリップが強くなる（ファズ寄り）
  function makeDistortionCurve(amount = 50) {
    const n = 4096;
    const curve = new Float32Array(n);
    const k = amount;
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }

  // ─── Karplus-Strong プラック弦合成 ───
  // 撥のノイズを「弦長＝サンプリング周波数 / 周波数」のリングバッファで
  // 循環させ、毎周ローパス相当の平均化で減衰。フィードバック値で持続を制御。
  function pluckBuffer(ctx, freq, duration = 1.6, decay = 0.997) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const N   = Math.max(2, Math.floor(sr / freq));
    const buf = ctx.createBuffer(1, len, sr);
    const out = buf.getChannelData(0);

    const ring = new Float32Array(N);
    for (let i = 0; i < N; i++) ring[i] = (Math.random() * 2 - 1);

    let p = 0;
    for (let i = 0; i < len; i++) {
      const cur = ring[p];
      const nxt = ring[(p + 1) % N];
      out[i]   = cur;
      ring[p]  = (cur + nxt) * 0.5 * decay;
      p = (p + 1) % N;
    }
    return buf;
  }

  // ─── ギター単音 (3声トリプルトラッキング: L/C/R にデチューン) ───
  // amps は { inp } を持つアンプチャンネルの配列(3つ)。
  // 各声をそれぞれ別アンプに送り、わずかなピッチ差と時間差で
  // 「録り直しを 3回重ねた」ような厚いステレオ像を作る。
  function pickGuitar(ctx, amps, freq, vel, dur = 0.95) {
    const sr     = ctx.sampleRate;
    const voices = [
      { detune: 0.997, delay: 0.012, gain: 0.55, ampIdx: 0 },  // L slightly flat, late
      { detune: 1.000, delay: 0.000, gain: 0.65, ampIdx: 1 },  // C on time
      { detune: 1.003, delay: 0.020, gain: 0.55, ampIdx: 2 },  // R slightly sharp, late
    ];

    voices.forEach((v) => {
      const start = ctx.currentTime + v.delay;
      const buf   = pluckBuffer(ctx, freq * v.detune, dur, 0.996);
      const src   = ctx.createBufferSource(); src.buffer = buf;
      const env   = ctx.createGain();
      env.gain.setValueAtTime(0, start);
      env.gain.linearRampToValueAtTime(vel * v.gain, start + 0.005);
      env.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      src.connect(env); env.connect(amps[v.ampIdx].inp);
      src.start(start); src.stop(start + dur + 0.05);
    });

    // ピックアタック (センターアンプのみ)
    const now = ctx.currentTime;
    const pkB = ctx.createBuffer(1, Math.floor(sr * 0.008), sr);
    const pkD = pkB.getChannelData(0);
    for (let i = 0; i < pkD.length; i++) pkD[i] = Math.random() * 2 - 1;
    const pk  = ctx.createBufferSource(); pk.buffer = pkB;
    const pkF = ctx.createBiquadFilter(); pkF.type = 'highpass'; pkF.frequency.value = 2200;
    const pkG = ctx.createGain();
    pkG.gain.setValueAtTime(vel * 0.20, now);
    pkG.gain.exponentialRampToValueAtTime(0.0001, now + 0.012);
    pk.connect(pkF); pkF.connect(pkG); pkG.connect(amps[1].inp);
    pk.start(now); pk.stop(now + 0.013);
  }

  // ─── コードストローク (フル三和音、ダウンストロークの時間差付き) ───
  // voicing は低い音から順の周波数配列(各コードの 5音くらい)。
  // 各弦をわずかに遅らせて鳴らすと "ジャラーン" のストローク感が出る。
  function strumChord(ctx, amps, voicing, vel, dur = 1.4, downstroke = true) {
    voicing.forEach((f, i) => {
      const idx = downstroke ? i : (voicing.length - 1 - i);
      const delayMs = idx * (5 + Math.random() * 5);
      // 高い弦ほど少し小さめ (ピックは下から上に当たる)
      const noteVel = vel * (0.95 - i * 0.04);
      setTimeout(() => pickGuitar(ctx, amps, f, noteVel, dur), delayMs);
    });
  }

  // ─── ギターアンプチャンネル (L/C/R それぞれ独立の歪みチェーン) ───
  // 個々の音声がここを通って summing される前にパンされる。
  // distortionAmount を少しずつ変えると、3声がそれぞれ異なる「弾き手」のような表情に。
  function makeGuitarAmp(ctx, panValue, distortAmount) {
    const inp  = ctx.createGain(); inp.gain.value = 1.0;
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistortionCurve(distortAmount);
    dist.oversample = '4x';
    const tone = ctx.createBiquadFilter();
    tone.type  = 'lowpass'; tone.frequency.value = 3200; tone.Q.value = 0.7;
    const pres = ctx.createBiquadFilter();
    pres.type  = 'peaking'; pres.frequency.value = 2400;
    pres.gain.value = 4; pres.Q.value = 1.2;
    const pan  = ctx.createStereoPanner(); pan.pan.value = panValue;
    inp.connect(dist); dist.connect(tone); tone.connect(pres); pres.connect(pan);
    return { inp, dist, tone, pres, pan };
  }

  // ─── ベースノート (saw + sub sine + LPF) ───
  function playBass(ctx, ampInput, freq, vel, dur = 0.45) {
    const now = ctx.currentTime;

    const osc = ctx.createOscillator();
    osc.type  = 'sawtooth';
    osc.frequency.value = freq;

    const sub = ctx.createOscillator();
    sub.type  = 'sine';
    sub.frequency.value = freq * 0.5;

    // 静止 LPF — ampInput 側でトーンを整形するので、ここはアタックフィルタとして
    const lp = ctx.createBiquadFilter();
    lp.type  = 'lowpass';
    lp.frequency.setValueAtTime(freq * 7, now);
    lp.frequency.exponentialRampToValueAtTime(freq * 2.4, now + dur * 0.5);
    lp.Q.value = 2.5;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vel * 0.55, now + 0.006);
    env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    const subEnv = ctx.createGain();
    subEnv.gain.setValueAtTime(0, now);
    subEnv.gain.linearRampToValueAtTime(vel * 0.30, now + 0.008);
    subEnv.gain.exponentialRampToValueAtTime(0.0001, now + dur * 0.9);

    osc.connect(lp); lp.connect(env); env.connect(ampInput);
    sub.connect(subEnv); subEnv.connect(ampInput);
    osc.start(now); osc.stop(now + dur + 0.05);
    sub.start(now); sub.stop(now + dur + 0.05);
  }

  // ─── キックドラム (低域サインスイープ + クリック) ───
  function hitKick(ctx, output, vel) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type  = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(38, now + 0.09);
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * 1.25, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
    osc.connect(env); env.connect(output);
    osc.start(now); osc.stop(now + 0.45);

    // ビーターのクリック
    const sr = ctx.sampleRate;
    const cb = ctx.createBuffer(1, Math.floor(sr * 0.012), sr);
    const cd = cb.getChannelData(0);
    for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1;
    const cs = ctx.createBufferSource(); cs.buffer = cb;
    const cf = ctx.createBiquadFilter(); cf.type = 'highpass'; cf.frequency.value = 1500;
    const cg = ctx.createGain();
    cg.gain.setValueAtTime(vel * 0.55, now);
    cg.gain.exponentialRampToValueAtTime(0.0001, now + 0.012);
    cs.connect(cf); cf.connect(cg); cg.connect(output);
    cs.start(now); cs.stop(now + 0.013);
  }

  // ─── スネア (220Hz トーン + ハイパスノイズ) ───
  function hitSnare(ctx, output, vel) {
    const now = ctx.currentTime;

    const osc = ctx.createOscillator();
    osc.type  = 'triangle';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(140, now + 0.08);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.45, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.15);

    const sr = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.18), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const nf = ctx.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 850;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.85, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    ns.connect(nf); nf.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + 0.18);
  }

  // ─── ハイハット (高域ノイズ短) ───
  function hitHihat(ctx, output, vel, open = false) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const dur = open ? 0.24 : 0.045;
    const nb  = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns  = ctx.createBufferSource(); ns.buffer = nb;
    const nf  = ctx.createBiquadFilter();
    nf.type   = 'highpass'; nf.frequency.value = 7200; nf.Q.value = 0.8;
    const nf2 = ctx.createBiquadFilter();
    nf2.type  = 'bandpass'; nf2.frequency.value = 9500; nf2.Q.value = 0.5;
    const ng  = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.42, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    ns.connect(nf); nf.connect(nf2); nf2.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + dur + 0.01);
  }

  // ─── クラッシュシンバル (長いハイパスノイズ + 高速減衰) ───
  function hitCrash(ctx, output, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const dur = 1.7;
    const nb  = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns  = ctx.createBufferSource(); ns.buffer = nb;
    const nf  = ctx.createBiquadFilter();
    nf.type   = 'highpass'; nf.frequency.value = 4000;
    const ng  = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.55, now);
    ng.gain.exponentialRampToValueAtTime(0.06, now + 0.06);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    ns.connect(nf); nf.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + dur + 0.02);
  }

  // ─── タム (サインスイープ + シェル鳴り) ───
  function hitTom(ctx, output, freq, vel) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type  = 'sine';
    osc.frequency.setValueAtTime(freq * 1.4, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.18);
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * 0.7, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    osc.connect(env); env.connect(output);
    osc.start(now); osc.stop(now + 0.34);

    const sr = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.08), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const nf = ctx.createBiquadFilter();
    nf.type  = 'bandpass'; nf.frequency.value = freq * 3; nf.Q.value = 1.5;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.30, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    ns.connect(nf); nf.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + 0.09);
  }

  // ============================================================
  //  ロックグルーヴ自律ループ (Oasis アンセム仕様)
  //  4/4 拍子: kick 1,3 / snare 2,4 / hihat 8分
  //  _activeProgression (現在の曲のコード列) を 1小節ごとに進める。
  //  ベースは 8分音符でコードの bassNotes を順番に踏む(歩く)。
  //  4小節周期でクラッシュ・コード進行の繰り返し・たまにフィル。
  //  S.accMag・tempoDetector で BPM とベロシティが揺れる。
  // ============================================================
  // 現在のコード(advanceLead からも参照される閉包変数)
  let _currentChord = CHORDS.G;
  // 曲切替時に measureN をリセットして新曲の頭(コード1)から始めるためのフラグ
  let _songJustChanged = false;

  // ─── 曲切替: 進行 / BPM / 歪み量 / サブベースのトニックを更新 ───
  function applySong(idx) {
    const song = SONGS[idx];
    _activeSongIdx     = idx;
    _activeProgression = song.progression;
    _activeBpmBase     = song.bpmBase;
    _activeDrive       = song.drive;
    _songJustChanged   = true;

    if (audioCtx && _audioRefs?.guitarAmps) {
      // 3チャンネルそれぞれに ±5 のずれた歪みカーブを再生成
      const offs = [-5, 0, -5];
      _audioRefs.guitarAmps.forEach((amp, i) => {
        amp.dist.curve = makeDistortionCurve(song.drive + offs[i]);
      });
    }
    // サブベースドローンを新曲のトニックに ramp
    if (audioCtx && _audioRefs?.droneOsc) {
      _audioRefs.droneOsc.frequency.linearRampToValueAtTime(
        song.tonic, audioCtx.currentTime + 1.2
      );
    }
    console.log('[song]', idx, song.name);
  }

  function startRockGroove(drumBus, guitarAmps, bassIn) {
    let measureN = 0;

    function nextTick() {
      if (!audioCtx) return;

      // 曲が直前に切り替わった場合は新曲のコード1から始める + クラッシュで合図
      if (_songJustChanged) {
        _songJustChanged = false;
        measureN = 0;
        hitCrash(audioCtx, drumBus, 0.7);
      }

      const conf = tempoDetector.effectiveConfidence();
      // 担ぎ手のテンポを優先しつつ、無いときは曲固有の bpmBase
      const bpm  = conf > 0.25
        ? Math.min(_activeBpmBase * 1.4, Math.max(_activeBpmBase * 0.7, tempoDetector.getBPM()))
        : _activeBpmBase + S.accMag * 25;
      const sixteenth = 60000 / bpm / 4;
      const measureMs = sixteenth * 16;
      const vel = 0.30 + S.accMag * 0.38 + S.brightness * 0.08;

      // 今の小節のコードを active progression から取得
      const chordName = _activeProgression[measureN % _activeProgression.length];
      const chord     = CHORDS[chordName];
      _currentChord   = chord;
      measureN++;

      // === 16ステップでドラム・ベース・ギターを組む ===
      for (let s = 0; s < 16; s++) {
        const tMs = (sixteenth * s) | 0;

        // ハイハット: 8分音符
        if (s % 2 === 0) {
          const hhVel = vel * (s % 4 === 0 ? 0.85 : 0.55);
          const open  = (s === 14 && Math.random() < 0.30);
          setTimeout(() => hitHihat(audioCtx, drumBus, hhVel, open), tMs);
        }

        // キック: 1拍目, 3拍目, 食い気味の3拍目裏たまに
        if (s === 0 || s === 8 || (s === 6 && Math.random() < 0.25)) {
          setTimeout(() => { hitKick(audioCtx, drumBus, vel * 1.0); duckSidechain(); }, tMs);
        }

        // スネア: 2拍目, 4拍目 (バックビート)
        if (s === 4 || s === 12) {
          setTimeout(() => hitSnare(audioCtx, drumBus, vel * 0.85), tMs);
        }

        // ベース: 8分刻み、コードの bassNotes を順に歩く
        // (s/2 = 0..7 を bassNotes.length で割って循環)
        if (s % 2 === 0) {
          const beatN  = s >> 1;        // 0..7 (1小節 8分8個)
          const bIdx   = beatN % chord.bassNotes.length;
          const bFreq  = chord.bassNotes[bIdx];
          const bvel   = vel * (s === 0 ? 0.80 : (s % 4 === 0 ? 0.65 : 0.50));
          setTimeout(() => playBass(audioCtx, bassIn, bFreq, bvel,
                                    sixteenth * 1.6 / 1000), tMs);
        }

        // ギターストローク: 1拍目に大きく、3拍目に弱く(下→上の "ジャラーン")
        if (s === 0) {
          setTimeout(() => strumChord(audioCtx, guitarAmps, chord.voicing,
                                      vel * 0.90, sixteenth * 12 / 1000, true), tMs);
        } else if (s === 8) {
          // 弱拍は上ストローク
          setTimeout(() => strumChord(audioCtx, guitarAmps, chord.voicing,
                                      vel * 0.55, sixteenth * 6 / 1000, false), tMs);
        }

        // 8分裏の弱ストローク (Oasis の "ジャカジャカ" 感)
        if ((s === 4 || s === 12) && Math.random() < 0.50) {
          setTimeout(() => strumChord(audioCtx, guitarAmps, chord.voicing,
                                      vel * 0.30, sixteenth * 4 / 1000, true), tMs);
        }

        // 4小節目最後の方はタムフィル
        if (measureN % 4 === 0 && s >= 12 && s % 2 === 0 && Math.random() < 0.55) {
          const tomFreq = 110 + (s - 12) * 22;
          setTimeout(() => hitTom(audioCtx, drumBus, tomFreq, vel * 0.70), tMs);
        }
      }

      // クラッシュ: 進行の頭で
      if ((measureN - 1) % _activeProgression.length === 0 && Math.random() < 0.65) {
        hitCrash(audioCtx, drumBus, vel * 0.60);
      }

      setTimeout(nextTick, measureMs | 0);
    }

    setTimeout(nextTick, 800);
  }

  // ============================================================
  //  メイン音響初期化（ユーザータップ後に呼ばれる）
  // ============================================================
  async function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── ルーティング ───
    //   instrBus → dry → comp → master → destination
    //   instrBus → rvSend → convRev → master
    const master = audioCtx.createGain();
    master.gain.value = 0.82;
    master.connect(audioCtx.destination);

    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -12; comp.knee.value = 6;
    comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.15;
    comp.connect(master);

    const convRev = createConvReverb(audioCtx, 3.5, 2.6);
    convRev.connect(master);

    const instrBus = audioCtx.createGain(); instrBus.gain.value = 1.0;
    instrBus.connect(comp);               // ドライ

    const rvSend = audioCtx.createGain(); rvSend.gain.value = 0.45;
    instrBus.connect(rvSend);
    rvSend.connect(convRev);             // ウェット

    // ─── Pillar 2: グラニュラー → WebRTC 専用デスティネーション ───
    granularDest = audioCtx.createMediaStreamDestination();
    const granBus = audioCtx.createGain(); granBus.gain.value = 0.80;
    granBus.connect(granularDest);
    // 担ぎ手ローカルにはグラニュラーは流さない（エコー防止）

    // ─── マイク ───
    try {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl:  false,
        },
        video: false,
      });
      micAnalyser = audioCtx.createAnalyser();
      micAnalyser.fftSize = 256;
      audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);
      micBuf = new Uint8Array(micAnalyser.frequencyBinCount);

      // Pillar 1: グラニュラーエンジン起動
      granEngine = new GranularEngine(audioCtx, granBus);
      granEngine.start(micStream);
    } catch (e) {
      console.warn('[audio] マイク取得失敗:', e);
    }

    // ─── ギターアンプ 3チャンネル (L/C/R) ───
    // Oasis のクランチ感に合わせて控えめな歪み (amount 25-30、ファズではなくドライブ寄り)
    const guitarAmps = [
      makeGuitarAmp(audioCtx, -0.7, 25),  // L
      makeGuitarAmp(audioCtx,  0.0, 30),  // C
      makeGuitarAmp(audioCtx,  0.7, 25),  // R
    ];
    const guitarBus = audioCtx.createGain(); guitarBus.gain.value = 0.42;
    guitarAmps.forEach(a => a.pan.connect(guitarBus));

    // ── サイドチェイン用 ダックゲイン (キックで一瞬下がる) ──
    const guitarDuck = audioCtx.createGain(); guitarDuck.gain.value = 1.0;
    guitarBus.connect(guitarDuck);
    guitarDuck.connect(instrBus);

    // ─── ベースアンプチェーン (ローパス + 低域ピーキング) ───
    const bassAmp = audioCtx.createGain(); bassAmp.gain.value = 1.0;
    const bassToneFilt = audioCtx.createBiquadFilter();
    bassToneFilt.type = 'lowpass';
    bassToneFilt.frequency.value = 850;
    bassToneFilt.Q.value = 1.0;
    const bassPunch = audioCtx.createBiquadFilter();
    bassPunch.type  = 'peaking';
    bassPunch.frequency.value = 90;
    bassPunch.gain.value = 5;
    bassPunch.Q.value = 1.5;
    const bassBus = audioCtx.createGain(); bassBus.gain.value = 0.65;
    bassAmp.connect(bassToneFilt);
    bassToneFilt.connect(bassPunch);
    bassPunch.connect(bassBus);
    const bassDuck = audioCtx.createGain(); bassDuck.gain.value = 1.0;
    bassBus.connect(bassDuck);
    bassDuck.connect(instrBus);

    // ─── ドラムバス (ドラムは生音、リバーブ控えめ) ───
    const drumBus = audioCtx.createGain(); drumBus.gain.value = 0.85;
    drumBus.connect(instrBus);

    // 起動一打 (G major コードで「立ち上がり感」)
    setTimeout(() => { hitKick(audioCtx, drumBus, 0.6); duckSidechain(); },  300);
    setTimeout(() => strumChord(audioCtx, guitarAmps, CHORDS.G.voicing, 0.55, 1.4), 320);
    setTimeout(() => hitCrash(audioCtx, drumBus, 0.45),                      330);

    // ─── 環境ノイズテクスチャ (アンプヒス感、薄め) ───
    const envBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
    const ed = envBuf.getChannelData(0);
    for (let i = 0; i < ed.length; i++) ed[i] = Math.random() * 2 - 1;
    const envSrc = audioCtx.createBufferSource();
    envSrc.buffer = envBuf; envSrc.loop = true;
    const envFilt = audioCtx.createBiquadFilter();
    envFilt.type  = 'bandpass'; envFilt.frequency.value = 800; envFilt.Q.value = 0.7;
    const envGain = audioCtx.createGain(); envGain.gain.value = 0.025;
    envSrc.connect(envFilt); envFilt.connect(envGain); envGain.connect(rvSend);
    envSrc.start();

    // ─── サブベースドローン (G1 = 49Hz) ───
    const droneOsc = audioCtx.createOscillator();
    droneOsc.type  = 'triangle';
    droneOsc.frequency.value = 49.00;   // G1
    const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.06;
    droneOsc.connect(droneGain); droneGain.connect(bassAmp);
    droneOsc.start();

    _audioRefs = {
      instrBus, rvSend, comp, master, convRev,
      envFilt, envGain, droneGain, droneOsc,
      guitarAmps, guitarBus, guitarDuck,
      bassAmp, bassBus, bassDuck, drumBus,
    };

    // ── ロックグルーヴ自律ループ起動 ──
    startRockGroove(drumBus, guitarAmps, bassAmp);

    // ── 曲切替はサーバー主導: 接続時にサーバーから届いた _pendingSongIdx で初期化 ──
    applySong(_pendingSongIdx);

    // ─── リズムトリガー（加速度ピーク） ───
    // 担ぎ手の動きが大きいときに瞬間的にフィル/オープンハット/クラッシュが入る
    let peakCount = 0;
    onPeak((rel) => {
      tempoDetector.addPeak(performance.now());
      const vel = Math.min(rel / 5, 1);
      peakCount++;

      // タムフィル(連打)
      if (vel > 0.55 && Math.random() < 0.45) {
        const tomFs = [180, 140, 110, 85];
        tomFs.forEach((f, i) => {
          setTimeout(() => hitTom(audioCtx, drumBus, f, vel * 0.7), i * 80);
        });
      }

      // オープンハット (動きアクセント)
      if (Math.random() < 0.40) {
        hitHihat(audioCtx, drumBus, vel * 0.55, true);
      }

      // クラッシュ (大きい動き)
      if (vel > 0.65 && peakCount % 4 === 0) {
        hitCrash(audioCtx, drumBus, vel * 0.55);
      }

      // ベースのオクターブグリス (大きい動き、コードの 5度に向かって)
      if (vel > 0.55 && Math.random() < 0.30) {
        const fifthFreq = (_currentChord?.bassNotes?.[1]) || 73.42;
        playBass(audioCtx, bassAmp, fifthFreq, vel * 0.6, 0.32);
      }
    });

    // ─── ギターリード自動進行 (コード進行追従、Oasis 寄り) ───
    // 各コードの lead 配列(コードトーン + 隣接スケール音) の中をゆっくり歩く。
    // フレーズ感を出すため: 1〜3音 → 休符 → 1〜3音 のパターン。
    // confidence が高い時はフレーズ長が伸び、ベンドやハーモニーが入る。
    let leadStep = 0;   // 現在のコードの lead 配列内 index
    let phraseQueue = 0;  // 残りフレーズ音数 (0 で休符に入る)

    function advanceLead() {
      const chord = _currentChord || CHORDS.G;
      const lead  = chord.lead;
      const conf  = tempoDetector.effectiveConfidence();

      // 休符明けに新しいフレーズを開始
      if (phraseQueue <= 0) {
        // フレーズ長: confidence が高いほど長い (1〜4音)
        phraseQueue = 1 + Math.floor(Math.random() * (1.5 + conf * 2.5));
        // フレーズ開始位置: コードトーンに着地 (lead[0..2])
        leadStep = Math.floor(Math.random() * 3);
      } else {
        // フレーズ中: 隣接音にゆっくり移動
        if (Math.random() < 0.75) {
          leadStep += Math.random() < 0.55 ? 1 : -1;
          leadStep = Math.max(0, Math.min(lead.length - 1, leadStep));
        }
      }

      const freq = lead[leadStep];

      if (audioCtx && _audioRefs?.guitarAmps) {
        const amps = _audioRefs.guitarAmps;
        // 音価: フレーズの最後は長め (歌詞の語尾感)
        const isLast = phraseQueue === 1;
        const dur    = isLast ? 0.7 + Math.random() * 0.5 : 0.35 + Math.random() * 0.25;
        const lvel   = 0.40 + S.accMag * 0.30;
        pickGuitar(audioCtx, amps, freq, lvel, dur);

        // ハーモニー (フレーズの最後に 3度下のハモり、Oasis 二人ボーカル風)
        if (isLast && conf > 0.30 && Math.random() < 0.35) {
          const harmIdx = Math.max(0, leadStep - 2);
          setTimeout(() => pickGuitar(audioCtx, amps, lead[harmIdx], lvel * 0.55, dur * 0.85), 25);
        }
      }

      phraseQueue--;

      // 次の音のタイミング: フレーズ中は短く、フレーズ間は休符を挟む
      const baseMs = Math.max(220, tempoDetector.getFueInterval(S.accMag) * 0.55);
      const ms = phraseQueue <= 0
        ? baseMs * 2.5 + Math.random() * 400      // 休符 (1拍以上)
        : baseMs;
      setTimeout(advanceLead, ms | 0);
    }
    setTimeout(advanceLead, 1500);   // 進行が立ち上がってからリード開始

    updateLoop();
  }

  // ============================================================
  //  マイク解析
  // ============================================================
  function analyzeMic() {
    if (!micAnalyser) return;
    micAnalyser.getByteFrequencyData(micBuf);
    const avg = micBuf.reduce((s, v) => s + v, 0) / (micBuf.length * 255);
    S.mic = lerp(S.mic, avg * 4, 0.1);
  }

  // ============================================================
  //  毎フレーム更新ループ
  // ============================================================
  function updateLoop() {
    requestAnimationFrame(updateLoop);
    if (!_audioRefs || !audioCtx) return;

    analyzeFrame();
    analyzeMic();

    const t = audioCtx.currentTime;
    const a = _audioRefs;

    // グラニュラー変調
    if (granEngine) {
      granEngine.density = 35 + (1 - Math.min(S.mic, 1)) * 90;
      granEngine.pitch   = 0.88 + S.colorTemp * 0.28;
      granEngine.spread  = 0.5 + S.accMag * 0.5;
    }

    // 環境ノイズ (アンプヒス) を明るさで揺らす
    a.envFilt.frequency.linearRampToValueAtTime(400 + S.brightness * 1200, t + 0.3);
    a.envGain.gain.linearRampToValueAtTime(0.018 + S.mic * 0.04, t + 0.3);

    // ギタートーン (3チャンネルすべて): 動きが大きいほど高域開く (ワウ感)
    if (a.guitarAmps) {
      const tf = 2200 + S.accMag * 2400;
      a.guitarAmps.forEach(amp => amp.tone.frequency.linearRampToValueAtTime(tf, t + 0.25));
    }

    // リバーブウェット (ロックは控えめ。観客が多いと少し増える)
    a.rvSend.gain.linearRampToValueAtTime(
      0.18 + Math.min(audienceCount / 20, 1) * 0.20, t + 2
    );
  }

  function applyWorldToAudio(s) {
    if (!_audioRefs || !audioCtx) return;
    audienceCount = s.audienceCount;
    const crowd  = Math.min((s.audienceCount  || 0) / 20, 1);
    const energy = Math.min(s.avgAudienceEnergy || 0, 1);
    const t      = audioCtx.currentTime;
    const a      = _audioRefs;

    // 観客が盛り上がるほどリバーブが深まる
    a.rvSend.gain.linearRampToValueAtTime(
      0.18 + crowd * 0.18 + energy * 0.18, t + 1.5
    );

    // 観客エネルギー → ギターのドライブを上げる(ファズ感が増す)
    if (a.guitarBus) {
      a.guitarBus.gain.linearRampToValueAtTime(
        0.40 + energy * 0.30, t + 0.8
      );
    }
    // 3チャンネルそれぞれ少しずつズラした歪みカーブを再生成 (現在の曲の drive がベース)
    if (a.guitarAmps) {
      const offs = [-5, 0, -5];
      a.guitarAmps.forEach((amp, i) => {
        amp.dist.curve = makeDistortionCurve(_activeDrive + offs[i] + energy * 25);
      });
    }
    // ベースは群衆が多いほど太く (低域ピーキングは不変、出力ゲインで)
    if (a.bassBus) {
      a.bassBus.gain.linearRampToValueAtTime(
        0.62 + crowd * 0.18, t + 1.0
      );
    }
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  </script>
</body>

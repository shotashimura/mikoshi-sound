<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>神輿</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #start-screen .kanji {
      font-size: 5rem; color: rgba(255,220,100,0.85); font-family: serif;
    }
    #start-screen .hint {
      font-size: 0.8rem; color: rgba(255,220,100,0.3);
      font-family: sans-serif; letter-spacing: 0.35em;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
    #analysis-canvas, #capture-canvas { display: none; }
  </style>
</head>
<body>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="analysis-canvas" width="80"  height="60"></canvas>
  <canvas id="capture-canvas"  width="320" height="240"></canvas>

  <div id="start-screen">
    <div class="kanji">神輿</div>
    <div class="hint">タップして開始</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  四七抜き短音階 (D E G A C) の周波数テーブル
  // ============================================================
  const YO = [
    73.42, 82.41, 98.00, 110.00, 130.81,
    146.83, 164.81, 196.00, 220.00, 261.63,
    293.66, 329.63, 392.00, 440.00, 523.25,
    587.33, 659.26, 784.00,
  ];

  // ============================================================
  //  センサー状態
  // ============================================================
  const S = {
    brightness: 0.5, whiteRatio: 0.3, colorTemp: 0.5,
    accMag: 0, accX: 0, accY: 0, mic: 0,
  };
  let voiceIndex    = 0;
  let audienceCount = 0;
  let cameraStream  = null;
  let audioReady    = false;

  // Web Audio API グローバル
  let audioCtx     = null;
  let granularDest = null;  // MediaStreamDestinationNode → WebRTC audio track
  let granEngine   = null;  // GranularEngine instance
  let fueObj       = null;  // fue oscillator refs
  let fue2Obj      = null;  // 第2笛（ハーモニー）
  let _audioRefs   = null;  // instrument bus refs for updateLoop
  let micAnalyser  = null;
  let micBuf       = null;

  // ============================================================
  //  WebRTC: broadcaster（担ぎ手→観客へ映像＋グラニュラー音声）
  // ============================================================
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ],
  };
  const peerConns = new Map();  // viewerId → RTCPeerConnection

  async function createPeerForViewer(viewerId) {
    if (peerConns.has(viewerId)) peerConns.get(viewerId).close();

    const pc = new RTCPeerConnection(ICE_CONFIG);
    peerConns.set(viewerId, pc);

    // 映像トラック
    if (cameraStream) {
      cameraStream.getVideoTracks().forEach((t) => pc.addTrack(t, cameraStream));
    }

    // Pillar 2: グラニュラー音声トラック
    if (granularDest) {
      const at = granularDest.stream.getAudioTracks()[0];
      if (at) pc.addTrack(at, granularDest.stream);
    }

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice', { to: viewerId, ice: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      console.log(`[PC ${viewerId.slice(-4)}] ${pc.connectionState}`);
      if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
        peerConns.delete(viewerId);
      }
    };

    const offer = await pc.createOffer({ offerToReceiveVideo: false, offerToReceiveAudio: false });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: viewerId, offer });
  }

  // ============================================================
  //  Socket.io
  // ============================================================
  const socket = io({ transports: ['websocket'] });

  socket.on('joined_mikoshi', (d) => { voiceIndex = d.voiceIndex; });

  socket.on('world_state', (s) => {
    audienceCount = s.audienceCount;
    if (audioReady) applyWorldToAudio(s);
  });

  socket.on('viewer_request', async ({ viewerId }) => {
    if (!cameraStream) return;
    await createPeerForViewer(viewerId);
  });

  socket.on('answer', async ({ from, answer }) => {
    const pc = peerConns.get(from);
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('ice', ({ from, ice }) => {
    const pc = peerConns.get(from);
    if (pc && ice) pc.addIceCandidate(new RTCIceCandidate(ice)).catch(() => {});
  });

  setInterval(() => {
    if (!audioReady) return;
    socket.emit('sensor_data', {
      brightness: S.brightness, whiteRatio: S.whiteRatio,
      colorTemp: S.colorTemp, accMagnitude: S.accMag,
      accX: S.accX, accY: S.accY, micLevel: S.mic,
    });
  }, 150);

  // ============================================================
  //  タップで開始
  // ============================================================
  document.getElementById('start-screen').addEventListener('pointerdown', async () => {
    document.getElementById('start-screen').remove();
    socket.emit('join_mikoshi');
    await initCamera();
    await initAudio();   // マイクもここで取得
    await initMotion();
    audioReady = true;
  }, { once: true });

  // ============================================================
  //  カメラ
  // ============================================================
  const camEl  = document.getElementById('cam');
  const anvCtx = document.getElementById('analysis-canvas')
                   .getContext('2d', { willReadFrequently: true });

  async function initCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      camEl.srcObject = cameraStream;
      await new Promise((r) => { camEl.onloadedmetadata = r; });
    } catch (e) { console.warn('[camera]', e); }
  }

  function analyzeFrame() {
    if (!camEl.videoWidth) return;
    anvCtx.drawImage(camEl, 0, 0, 80, 60);
    const px = anvCtx.getImageData(0, 0, 80, 60).data;
    const n  = px.length / 4;
    let lum = 0, white = 0, rSum = 0, bSum = 0;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      lum  += 0.2126*r + 0.7152*g + 0.0722*b;
      if (r > 200 && g > 200 && b > 200) white++;
      rSum += r; bSum += b;
    }
    S.brightness = lerp(S.brightness, lum / (n * 255),    0.07);
    S.whiteRatio = lerp(S.whiteRatio, white / n,           0.07);
    S.colorTemp  = lerp(S.colorTemp,  rSum/(rSum+bSum+1), 0.05);
  }

  // ============================================================
  //  加速度センサー
  // ============================================================
  const peakCBs = [];
  function onPeak(fn) { peakCBs.push(fn); }

  async function initMotion() {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try { await DeviceMotionEvent.requestPermission(); } catch (_) {}
    }
    let prevMag = 0, lastPeak = 0;
    window.addEventListener('devicemotion', (e) => {
      const g = e.accelerationIncludingGravity;
      if (!g) return;
      const { x = 0, y = 0, z = 0 } = g;
      const rel = Math.max(Math.sqrt(x*x + y*y + z*z) - 9.8, 0);
      S.accX   = x / 10; S.accY = y / 10;
      S.accMag = lerp(S.accMag, Math.min(rel / 8, 1), 0.15);
      const now = performance.now();
      if (rel > 2.0 && prevMag <= rel && now - lastPeak > 250) {
        lastPeak = now;
        peakCBs.forEach((fn) => fn(rel));
      }
      prevMag = rel;
    });
  }

  // ============================================================
  //  Pillar 1: グラニュラーエンジン（AudioWorklet 版）
  //
  //  優先順位:
  //   1. SharedArrayBuffer + AudioWorklet — 生 PCM をリングバッファに直書き
  //      (COOP/COEP ヘッダーが設定されている場合のみ利用可能)
  //   2. postMessage + AudioWorklet     — コーデック圧縮なし Float32 転送
  //   3. MediaRecorder                  — 最終フォールバック（opus 圧縮あり）
  //
  //  リングバッファ仕様:
  //   RING_SIZE = 2^18 = 262144 サンプル (48kHz で約5.5秒)
  //   ctrl[0] = writePos, ctrl[1] = hasWrapped(0/1)
  // ============================================================
  class GranularEngine {
    constructor(ctx, outputNode) {
      this.ctx    = ctx;
      this.output = outputNode;
      this.pitch  = 1.0;
      this.spread = 0.7;
      this.density = 80;   // ms/grain (センサーで変調)
      this.running = false;

      // Mode A: SharedArrayBuffer リングバッファ
      this.RING_SIZE  = 1 << 18;   // 262144 サンプル
      this.ringBuffer = null;      // SharedArrayBuffer (Int16)
      this.ctrlBuffer = null;      // SharedArrayBuffer (Int32[4])
      this.ringData   = null;
      this.ctrlData   = null;
      this.useShared  = false;

      // Mode B / C: PCM バッファ配列
      this.pcmBuffers = [];
      this.maxPCMBufs = 10;
    }

    async start(micStream) {
      this.running = true;
      const hasShared = typeof SharedArrayBuffer !== 'undefined';

      try {
        await this.ctx.audioWorklet.addModule('/worklet/mic-capture.js');
        const micSrc     = this.ctx.createMediaStreamSource(micStream);
        const captureNode = new AudioWorkletNode(this.ctx, 'mic-capture-processor');

        if (hasShared) {
          // ── Mode A: SharedArrayBuffer ──────────────────────
          this.ringBuffer = new SharedArrayBuffer(this.RING_SIZE * 2); // Int16
          this.ctrlBuffer = new SharedArrayBuffer(16);                 // Int32[4]
          this.ringData   = new Int16Array(this.ringBuffer);
          this.ctrlData   = new Int32Array(this.ctrlBuffer);

          captureNode.port.postMessage({
            type: 'init-shared',
            ring: this.ringBuffer,
            ctrl: this.ctrlBuffer,
          });
          this.useShared = true;
          console.log('[granular] Mode A: SharedArrayBuffer リングバッファ');

        } else {
          // ── Mode B: postMessage フォールバック ──────────────
          captureNode.port.postMessage({ type: 'init-pm' });
          captureNode.port.onmessage = ({ data }) => {
            if (data.type !== 'pcm') return;
            try {
              const sr      = this.ctx.sampleRate;
              const float32 = new Float32Array(data.buffer);
              const buf     = this.ctx.createBuffer(1, float32.length, sr);
              buf.copyToChannel(float32, 0);
              this.pcmBuffers.push(buf);
              if (this.pcmBuffers.length > this.maxPCMBufs) this.pcmBuffers.shift();
            } catch (_) {}
          };
          console.log('[granular] Mode B: postMessage PCM 転送');
        }

        // ワークレットを audio graph に保持するためサイレンサーに接続
        const silencer = this.ctx.createGain();
        silencer.gain.value = 0;
        micSrc.connect(captureNode);
        captureNode.connect(silencer);
        silencer.connect(this.ctx.destination);

      } catch (e) {
        console.warn('[granular] AudioWorklet 失敗 → MediaRecorder フォールバック:', e);
        this._startMediaRecorder(micStream);
      }

      this._grainLoop();
    }

    stop() { this.running = false; }

    // ── Mode A: SharedArrayBuffer から粒子を再生 ───────────
    _playGrainShared() {
      const wPos       = Atomics.load(this.ctrlData, 0);
      const hasWrapped = Atomics.load(this.ctrlData, 1);
      const RING       = this.RING_SIZE;
      const sr         = this.ctx.sampleRate;

      const validSamples  = hasWrapped ? RING : wPos;
      const durSamples    = Math.floor(sr * (0.055 + Math.random() * 0.13));
      const safeZone      = Math.floor(sr * 0.08);  // 直近 80ms は書き込み中の可能性があるので除外
      const maxLookback   = Math.min(validSamples - safeZone - durSamples,
                                     Math.floor(sr * 4.5));

      if (maxLookback < durSamples) return; // バッファがまだ十分に溜まっていない

      const lookback   = safeZone + durSamples + Math.floor(Math.random() * (maxLookback - durSamples));
      const grainStart = ((wPos - lookback) % RING + RING) % RING;

      // リングバッファから AudioBuffer を生成（Int16 → float32）
      const buf  = this.ctx.createBuffer(1, durSamples, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < durSamples; i++) {
        data[i] = this.ringData[(grainStart + i) % RING] / 32767;
      }
      this._scheduleGrain(buf, 0, durSamples / sr);
    }

    // ── Mode B / C: AudioBuffer 配列から粒子を再生 ─────────
    _playGrainBuffer() {
      if (!this.pcmBuffers.length) return;
      const buf = this.pcmBuffers[Math.floor(Math.random() * this.pcmBuffers.length)];
      if (!buf || buf.duration < 0.04) return;

      const sr         = this.ctx.sampleRate;
      const grainDur   = 0.055 + Math.random() * 0.13;
      const maxStart   = Math.max(0, buf.duration - grainDur);
      const startSec   = Math.random() * maxStart;
      this._scheduleGrain(buf, startSec, grainDur);
    }

    // ── 粒子スケジューラ共通処理（Hanning エンベロープ＋パン）─
    _scheduleGrain(buf, startSec, durSec) {
      const now = this.ctx.currentTime;
      const src = this.ctx.createBufferSource();
      src.buffer             = buf;
      src.playbackRate.value = this.pitch * (0.83 + Math.random() * 0.34);

      const env = this.ctx.createGain();
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.42, now + durSec * 0.15);
      env.gain.setValueAtTime(0.42,          now + durSec * 0.85);
      env.gain.linearRampToValueAtTime(0,    now + durSec);

      const pan = this.ctx.createStereoPanner();
      pan.pan.value = (Math.random() - 0.5) * this.spread;

      src.connect(env); env.connect(pan); pan.connect(this.output);
      src.start(now, startSec, durSec + 0.01);
    }

    _playGrain() {
      if (this.useShared)          this._playGrainShared();
      else if (this.pcmBuffers.length) this._playGrainBuffer();
    }

    _grainLoop() {
      const tick = () => {
        if (!this.running) return;
        this._playGrain();
        setTimeout(tick, this.density * (0.5 + Math.random()));
      };
      tick();
    }

    // ── Mode C: MediaRecorder 最終フォールバック ────────────
    _startMediaRecorder(stream) {
      const doCapture = () => {
        if (!this.running) return;
        let mimeType = '';
        for (const m of ['audio/webm;codecs=opus', 'audio/webm', '']) {
          if (!m || MediaRecorder.isTypeSupported(m)) { mimeType = m; break; }
        }
        try {
          const mr     = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          const chunks = [];
          mr.ondataavailable = (e) => { if (e.data?.size > 0) chunks.push(e.data); };
          mr.onstop = async () => {
            try {
              const blob    = new Blob(chunks, { type: mr.mimeType || 'audio/webm' });
              const decoded = await this.ctx.decodeAudioData(await blob.arrayBuffer());
              if (decoded?.duration > 0.04) {
                this.pcmBuffers.push(decoded);
                if (this.pcmBuffers.length > 6) this.pcmBuffers.shift();
              }
            } catch (_) {}
            if (this.running) setTimeout(doCapture, 50);
          };
          mr.start();
          setTimeout(() => { try { if (mr.state === 'recording') mr.stop(); } catch (_) {} }, 600);
        } catch (e) {
          setTimeout(() => { if (this.running) doCapture(); }, 1200);
        }
      };
      doCapture();
    }
  }

  // ============================================================
  //  テンポ検出器
  //  加速度センサーのピーク時刻を蓄積し、打ち間隔の中央値から
  //  担ぎ手の「おおよそのテンポ」を推定する。
  //
  //  設計方針:
  //   - 直近 8 ピークの間隔を記録
  //   - 外れ値除去（中央値の 0.4〜2.5 倍の範囲外は棄却）
  //   - 新しいピークほど重みを大きくした加重平均でテンポを平滑化
  //   - CV（変動係数）でテンポの一貫性を 0-1 の confidence として表現
  //   - ピークが途絶えると confidence が時間減衰する
  //   - getFueInterval(): テンポ×フレーズ長(1–3 拍) + ±15% 人間的ゆらぎ
  // ============================================================
  class TempoDetector {
    constructor() {
      this.times      = [];      // 直近ピーク時刻(ms)の circular buffer
      this.maxPeaks   = 8;
      this.tempoMs    = 1000;    // 現在の推定テンポ間隔(ms)
      this.confidence = 0;       // 0-1: テンポの一貫性
      this.lastPeak   = 0;       // 最後にピークを受けた時刻
      // 許容テンポ範囲
      this.MIN_INTERVAL = 220;   // ~270 BPM
      this.MAX_INTERVAL = 2800;  // ~21 BPM
    }

    addPeak(timestamp) {
      // 短すぎる間隔のピークは無視（センサーノイズ対策）
      if (this.lastPeak && timestamp - this.lastPeak < this.MIN_INTERVAL) return;
      this.lastPeak = timestamp;
      this.times.push(timestamp);
      if (this.times.length > this.maxPeaks) this.times.shift();
      this._update();
    }

    _update() {
      if (this.times.length < 3) return;

      // 連続ピーク間の間隔を計算
      const intervals = [];
      for (let i = 1; i < this.times.length; i++) {
        const d = this.times[i] - this.times[i - 1];
        if (d >= this.MIN_INTERVAL && d <= this.MAX_INTERVAL) intervals.push(d);
      }
      if (intervals.length < 2) return;

      // 中央値を基準に外れ値除去（拍落ちや二重打ちを弾く）
      const sorted = [...intervals].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const valid  = intervals.filter(d => d >= median * 0.40 && d <= median * 2.50);
      if (valid.length < 2) return;

      // 新しいほど高い重みで加重平均
      let wSum = 0, wAvg = 0;
      valid.forEach((d, i) => {
        const w = i + 1;
        wAvg += d * w; wSum += w;
      });
      const estimate = wAvg / wSum;

      // テンポをゆっくり更新（急激な変化を抑制）
      this.tempoMs = this.tempoMs * 0.65 + estimate * 0.35;

      // confidence = 間隔の安定度（CV が小さいほど高い）
      const mean  = valid.reduce((s, d) => s + d, 0) / valid.length;
      const variance = valid.reduce((s, d) => s + (d - mean) ** 2, 0) / valid.length;
      const cv    = Math.sqrt(variance) / mean;   // 0 = 完全均一, >0.3 = バラバラ
      this.confidence = Math.max(0, Math.min(1, 1 - cv * 3.2));
    }

    // テンポ信頼度（ピークが途絶えると減衰）
    effectiveConfidence() {
      const elapsed = performance.now() - this.lastPeak;
      const decay   = Math.max(0, 1 - elapsed / (this.tempoMs * 4));
      return this.confidence * decay;
    }

    // 笛フレーズの次の間隔(ms)を返す
    // ── テンポ × フレーズ拍数 × 人間的ゆらぎ ──
    getFueInterval(accMag) {
      const conf = this.effectiveConfidence();

      // テンポベースの間隔（1〜3 拍ぶん）
      const beats        = 1 + Math.random() * 2;
      const tempoInterval = this.tempoMs * beats;

      // フォールバック（テンポ未確立時は accMag ベース）
      const fallback     = Math.max(350, 1300 / (0.5 + accMag * 1.5));

      // confidence でブレンド
      const base = conf > 0.25
        ? tempoInterval * conf + fallback * (1 - conf)
        : fallback;

      // ±15% 人間的ゆらぎ（打ちのユラギがそのまま音楽性に）
      const jitter = 0.85 + Math.random() * 0.30;
      return Math.max(240, base * jitter);
    }

    getBPM() { return 60000 / this.tempoMs; }
  }

  const tempoDetector = new TempoDetector();

  // ============================================================
  //  Pillar 3: ピュア Web Audio API お囃子楽器
  // ============================================================

  // 合成インパルスレスポンスによるコンボリューションリバーブ
  function createConvReverb(ctx, duration, decay) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const ir  = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / (decay * 0.38));
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = ir;
    return conv;
  }

  // 太鼓 ─ ノイズ帯域通過 + サインピッチ感
  function hitTaiko(ctx, output, baseFreq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;

    // 胴鳴り（低域バンドパスノイズ）
    const bodyBuf = ctx.createBuffer(1, Math.floor(sr * 0.9), sr);
    const bd = bodyBuf.getChannelData(0);
    for (let i = 0; i < bd.length; i++) bd[i] = Math.random() * 2 - 1;
    const bodyNoise = ctx.createBufferSource();
    bodyNoise.buffer = bodyBuf;
    const bodyFilt  = ctx.createBiquadFilter();
    bodyFilt.type   = 'bandpass';
    bodyFilt.frequency.value = baseFreq * 0.75;
    bodyFilt.Q.value = 2.2;
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(vel * 1.7, now);
    bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
    bodyNoise.connect(bodyFilt); bodyFilt.connect(bodyGain); bodyGain.connect(output);
    bodyNoise.start(now); bodyNoise.stop(now + 0.7);

    // 打面アタック（高域短ノイズ）
    const skinBuf = ctx.createBuffer(1, Math.floor(sr * 0.06), sr);
    const sd = skinBuf.getChannelData(0);
    for (let i = 0; i < sd.length; i++) sd[i] = Math.random() * 2 - 1;
    const skinNoise = ctx.createBufferSource();
    skinNoise.buffer = skinBuf;
    const skinFilt  = ctx.createBiquadFilter();
    skinFilt.type   = 'bandpass';
    skinFilt.frequency.value = baseFreq * 5.5;
    skinFilt.Q.value = 0.9;
    const skinGain = ctx.createGain();
    skinGain.gain.setValueAtTime(vel * 0.9, now);
    skinGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);
    skinNoise.connect(skinFilt); skinFilt.connect(skinGain); skinGain.connect(output);
    skinNoise.start(now); skinNoise.stop(now + 0.065);

    // ピッチサイン（余韻感）
    const toneOsc = ctx.createOscillator();
    toneOsc.type = 'sine';
    toneOsc.frequency.setValueAtTime(baseFreq * 1.4, now);
    toneOsc.frequency.exponentialRampToValueAtTime(baseFreq * 0.55, now + 0.28);
    const toneGain = ctx.createGain();
    toneGain.gain.setValueAtTime(vel * 0.45, now);
    toneGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    toneOsc.connect(toneGain); toneGain.connect(output);
    toneOsc.start(now); toneOsc.stop(now + 0.35);
  }

  // 鉦 ─ 非調和倍音（金属感）
  function hitKane(ctx, output, baseFreq) {
    const now    = ctx.currentTime;
    const ratios = [1, 2.76, 5.40, 8.93];
    const amps   = [1.0, 0.55, 0.28, 0.14];
    const decays = [2.5, 1.8, 1.2, 0.8];
    ratios.forEach((r, i) => {
      const osc = ctx.createOscillator();
      osc.type  = 'sine';
      osc.frequency.value = baseFreq * r;
      const g = ctx.createGain();
      g.gain.setValueAtTime(amps[i] * 0.32, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + decays[i]);
      osc.connect(g); g.connect(output);
      osc.start(now); osc.stop(now + decays[i] + 0.08);
    });
  }

  // 笛 ─ ブレスノイズ + ビブラート付きサイン
  function createFue(ctx, output) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * 4);
    const nBuf = ctx.createBuffer(1, len, sr);
    const nd   = nBuf.getChannelData(0);
    for (let i = 0; i < len; i++) nd[i] = Math.random() * 2 - 1;

    const noiseNode  = ctx.createBufferSource();
    noiseNode.buffer = nBuf; noiseNode.loop = true;
    const breathFilt = ctx.createBiquadFilter();
    breathFilt.type  = 'bandpass';
    breathFilt.frequency.value = 1400;
    breathFilt.Q.value = 3.5;
    const breathGain = ctx.createGain();
    breathGain.gain.value = 0.10;
    noiseNode.connect(breathFilt); breathFilt.connect(breathGain); breathGain.connect(output);
    noiseNode.start();

    const fueOsc = ctx.createOscillator();
    fueOsc.type  = 'sine';
    fueOsc.frequency.value = 523.25;  // C5

    const vibLFO   = ctx.createOscillator();
    vibLFO.type    = 'sine';
    vibLFO.frequency.value = 5.2;
    const vibGain  = ctx.createGain();
    vibGain.gain.value = 7;
    vibLFO.connect(vibGain); vibGain.connect(fueOsc.frequency);

    const fueGain  = ctx.createGain();
    fueGain.gain.value = 0.20;
    fueOsc.connect(fueGain); fueGain.connect(output);
    fueOsc.start(); vibLFO.start();

    return { breathFilt, breathGain, fueOsc, vibLFO, vibGain, fueGain };
  }

  // ============================================================
  //  追加楽器: 小鼓・締太鼓・拍子木・鈴・鉦連打
  // ============================================================

  // 小鼓 (kotsuzumi) — 胴鳴り「ポン」音
  function hitKotsuzumi(ctx, output, freq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.25), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const f  = ctx.createBiquadFilter();
    f.type   = 'bandpass'; f.frequency.value = freq * 2.2; f.Q.value = 5.0;
    const g  = ctx.createGain();
    g.gain.setValueAtTime(vel * 1.3, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.20);
    ns.connect(f); f.connect(g); g.connect(output);
    ns.start(now); ns.stop(now + 0.22);
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 3.8, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.6, now + 0.14);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.60, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.18);
  }

  // 締太鼓 (shime-daiko) — タイトな高域打音
  function hitShimeDaiko(ctx, output, freq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.10), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const f  = ctx.createBiquadFilter();
    f.type   = 'bandpass'; f.frequency.value = freq * 4.0; f.Q.value = 3.5;
    const g  = ctx.createGain();
    g.gain.setValueAtTime(vel * 1.8, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    ns.connect(f); f.connect(g); g.connect(output);
    ns.start(now); ns.stop(now + 0.10);
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 5.5, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 2.2, now + 0.06);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.70, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.09);
  }

  // 拍子木 (hyoshigi) — 乾いた木の打音
  function hitHyoshigi(ctx, output, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.035), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const hf = ctx.createBiquadFilter(); hf.type = 'highpass'; hf.frequency.value = 1800;
    const g  = ctx.createGain();
    g.gain.setValueAtTime(vel * 2.2, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.030);
    ns.connect(hf); hf.connect(g); g.connect(output);
    ns.start(now); ns.stop(now + 0.038);
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = 1350 + Math.random() * 300;
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.50, now + 0.002);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.15);
  }

  // 鈴 (suzu) — 揺れる鈴（デチューンしたサイン波クラスター）
  function hitSuzu(ctx, output, baseFreq, vel) {
    const now   = ctx.currentTime;
    const parts = [
      { f: baseFreq,          amp: 0.32, dec: 0.55 },
      { f: baseFreq * 1.005,  amp: 0.25, dec: 0.48 },
      { f: baseFreq * 0.997,  amp: 0.22, dec: 0.52 },
      { f: baseFreq * 2.010,  amp: 0.18, dec: 0.38 },
      { f: baseFreq * 2.008,  amp: 0.14, dec: 0.32 },
      { f: baseFreq * 3.012,  amp: 0.09, dec: 0.25 },
    ];
    parts.forEach(({ f, amp, dec }, i) => {
      const osc = ctx.createOscillator(); osc.type = 'sine';
      osc.frequency.value = f;
      const g = ctx.createGain();
      g.gain.setValueAtTime(vel * amp, now + i * 0.007);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dec);
      osc.connect(g); g.connect(output);
      osc.start(now + i * 0.007); osc.stop(now + dec + 0.05);
    });
  }

  // 鉦連打 (チンチキチン pattern) — チン・チキ・チン
  function hitKaneBurst(ctx, output, baseFreq, vel) {
    const timings = [0, 105, 185, 330];
    const vels    = [1.0, 0.45, 0.42, 0.88];
    timings.forEach((ms, i) => {
      setTimeout(() => {
        if (!ctx) return;
        hitKane(ctx, output, baseFreq * (1 + (Math.random() - 0.5) * 0.03), vel * vels[i]);
      }, ms);
    });
  }

  // ============================================================
  //  屋台囃子 自律リズムループ
  //  センサーなしでも鳴り続ける基本リズム
  //  S.accMag・S.brightness・tempoDetector に連動してダイナミクス変化
  // ============================================================
  function startHayashiRhythm(bus, taikoF, kaneF) {
    let beatN = 0;

    function tick() {
      if (!audioCtx) return;

      const conf   = tempoDetector.effectiveConfidence();
      const bpm    = conf > 0.25
        ? Math.min(155, Math.max(85, tempoDetector.getBPM()))
        : 105 + S.accMag * 28;
      const beatMs = 60000 / bpm;
      const vel    = 0.18 + S.accMag * 0.38 + S.brightness * 0.10;

      beatN++;

      // ── ビート1: 太鼓（常に） ──
      hitTaiko(audioCtx, bus, taikoF, vel * (0.72 + Math.random() * 0.28));

      // ── ビート1.5: 小鼓（裏拍） ──
      if (Math.random() < 0.82) {
        setTimeout(() => hitKotsuzumi(audioCtx, bus, taikoF * 2.5, vel * 0.65),
                   beatMs * 0.5 | 0);
      }

      // ── ビート1.67: 太鼓どこドン ──
      if (Math.random() < 0.68) {
        setTimeout(() => hitTaiko(audioCtx, bus, taikoF, vel * 0.52),
                   beatMs * 0.67 | 0);
      }

      // ── ビート2: 締太鼓 ──
      if (Math.random() < 0.60) {
        setTimeout(() => hitShimeDaiko(audioCtx, bus, taikoF, vel * 0.78),
                   beatMs * 1.0 | 0);
      }

      // ── ビート2.5: 小鼓 ──
      if (Math.random() < 0.65) {
        setTimeout(() => hitKotsuzumi(audioCtx, bus, taikoF * 2.5, vel * 0.50),
                   beatMs * 1.5 | 0);
      }

      // ── ビート3: 太鼓（やや軽め） ──
      if (Math.random() < 0.55) {
        setTimeout(() => hitTaiko(audioCtx, bus, taikoF, vel * 0.45),
                   beatMs * 2.0 | 0);
      }

      // ── ビート3.5: 締太鼓フィル ──
      if (Math.random() < 0.50) {
        setTimeout(() => hitShimeDaiko(audioCtx, bus, taikoF, vel * 0.60),
                   beatMs * 2.5 | 0);
      }

      // ── 鉦: 3拍ごと ──
      if (beatN % 3 === 0) {
        const kd = (beatMs * (0.8 + Math.random() * 0.6)) | 0;
        setTimeout(() => hitKane(audioCtx, bus, kaneF, vel * 0.82), kd);
      }

      // ── 鉦連打 チンチキチン: 8拍ごと ──
      if (beatN % 8 === 0) {
        setTimeout(() => hitKaneBurst(audioCtx, bus, kaneF, vel * 0.62),
                   beatMs * 2.2 | 0);
      }

      // ── 拍子木: まれに ──
      if (beatN % 14 === 0) {
        hitHyoshigi(audioCtx, bus, vel * 0.88);
      }

      // ── 鈴: 動きが大きいとき ──
      if (S.accMag > 0.30 && Math.random() < 0.42) {
        setTimeout(() => hitSuzu(audioCtx, bus, kaneF * 2, vel * 0.58),
                   beatMs * 0.22 | 0);
      }

      // ── 2拍単位で次へ（±8%のゆらぎ） ──
      setTimeout(tick, (beatMs * 2 * (0.92 + Math.random() * 0.16)) | 0);
    }

    setTimeout(tick, 1000);
  }

  // ============================================================
  //  メイン音響初期化（ユーザータップ後に呼ばれる）
  // ============================================================
  async function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── ルーティング ───
    //   instrBus → dry → comp → master → destination
    //   instrBus → rvSend → convRev → master
    const master = audioCtx.createGain();
    master.gain.value = 0.82;
    master.connect(audioCtx.destination);

    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -12; comp.knee.value = 6;
    comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.15;
    comp.connect(master);

    const convRev = createConvReverb(audioCtx, 3.5, 2.6);
    convRev.connect(master);

    const instrBus = audioCtx.createGain(); instrBus.gain.value = 1.0;
    instrBus.connect(comp);               // ドライ

    const rvSend = audioCtx.createGain(); rvSend.gain.value = 0.45;
    instrBus.connect(rvSend);
    rvSend.connect(convRev);             // ウェット

    // ─── Pillar 2: グラニュラー → WebRTC 専用デスティネーション ───
    granularDest = audioCtx.createMediaStreamDestination();
    const granBus = audioCtx.createGain(); granBus.gain.value = 0.80;
    granBus.connect(granularDest);
    // 担ぎ手ローカルにはグラニュラーは流さない（エコー防止）

    // ─── マイク ───
    try {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl:  false,
        },
        video: false,
      });
      micAnalyser = audioCtx.createAnalyser();
      micAnalyser.fftSize = 256;
      audioCtx.createMediaStreamSource(micStream).connect(micAnalyser);
      micBuf = new Uint8Array(micAnalyser.frequencyBinCount);

      // Pillar 1: グラニュラーエンジン起動
      granEngine = new GranularEngine(audioCtx, granBus);
      granEngine.start(micStream);
    } catch (e) {
      console.warn('[audio] マイク取得失敗:', e);
    }

    // ─── 担ぎ手ごとの基音 ───
    const baseIdx   = Math.min(voiceIndex * 3, YO.length - 1);
    const taikoFreq = YO[Math.max(0, baseIdx - 5)] || 110;
    const kaneFreq  = YO[Math.min(baseIdx + 2, YO.length - 1)] || 220;

    // 起動一打
    setTimeout(() => hitTaiko(audioCtx, instrBus, taikoFreq, 0.55), 300);
    setTimeout(() => hitKane(audioCtx, instrBus, kaneFreq),          750);

    // 笛（主旋律）
    fueObj = createFue(audioCtx, instrBus);

    // 第2笛（4度上のハーモニー）
    fue2Obj = createFue(audioCtx, instrBus);
    fue2Obj.fueOsc.frequency.value = YO[Math.min(8 + baseIdx + 3, YO.length - 1)];
    fue2Obj.fueGain.gain.value     = 0.09;
    fue2Obj.breathGain.gain.value  = 0.04;
    fue2Obj.vibGain.gain.value     = 5.5;
    fue2Obj.vibLFO.frequency.value = 5.9;

    // 環境ドローン（低域三角波）
    const droneOsc = audioCtx.createOscillator();
    droneOsc.type  = 'triangle';
    droneOsc.frequency.value = taikoFreq * 0.5;
    const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.13;
    droneOsc.connect(droneGain); droneGain.connect(rvSend);
    droneOsc.start();

    // 環境ノイズテクスチャ
    const envBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
    const ed = envBuf.getChannelData(0);
    for (let i = 0; i < ed.length; i++) ed[i] = Math.random() * 2 - 1;
    const envSrc = audioCtx.createBufferSource();
    envSrc.buffer = envBuf; envSrc.loop = true;
    const envFilt = audioCtx.createBiquadFilter();
    envFilt.type  = 'bandpass'; envFilt.frequency.value = 500; envFilt.Q.value = 0.9;
    const envGain = audioCtx.createGain(); envGain.gain.value = 0.055;
    envSrc.connect(envFilt); envFilt.connect(envGain); envGain.connect(rvSend);
    envSrc.start();

    _audioRefs = {
      instrBus, rvSend, comp, master, convRev,
      envFilt, envGain, droneGain, droneOsc,
    };

    // ── 屋台囃子 自律リズムループ起動 ──
    startHayashiRhythm(instrBus, taikoFreq, kaneFreq);

    // ─── リズムトリガー（加速度ピーク） ───
    let kaneCount = 0;
    onPeak((rel) => {
      // テンポ検出器にピーク時刻を登録（担ぎリズムを学習）
      tempoDetector.addPeak(performance.now());
      const vel = Math.min(rel / 5, 1);
      const ni  = Math.max(0, Math.min(baseIdx + Math.floor(S.brightness * 4), YO.length - 1));

      // 太鼓（主打）
      hitTaiko(audioCtx, instrBus, YO[Math.max(0, ni - 4)], 0.42 + vel * 0.55);

      // 小鼓（常時、裏拍感）
      hitKotsuzumi(audioCtx, instrBus, YO[Math.min(ni + 2, YO.length - 1)] * 2, vel * 0.72);

      // 鉦（4打に1回）
      if (++kaneCount % 4 === 0) {
        hitKane(audioCtx, instrBus, kaneFreq * (1 + S.colorTemp * 0.8));
      }

      // 鉦（ランダム）
      if (Math.random() < 0.38) {
        hitKane(audioCtx, instrBus, 650 + Math.random() * 750);
      }

      // 締太鼓フィル（少し遅れて）
      if (Math.random() < 0.58) {
        setTimeout(() => hitShimeDaiko(audioCtx, instrBus, taikoFreq, vel * 0.70),
                   (75 + Math.random() * 100) | 0);
      }

      // 鉦連打 チンチキチン（まれに）
      if (Math.random() < 0.20) {
        setTimeout(() => hitKaneBurst(audioCtx, instrBus, kaneFreq, vel * 0.62), 200);
      }

      // 拍子木（まれに）
      if (Math.random() < 0.15) {
        hitHyoshigi(audioCtx, instrBus, vel * 0.78);
      }

      // 鈴（vel 高いとき）
      if (vel > 0.52 && Math.random() < 0.45) {
        setTimeout(() => hitSuzu(audioCtx, instrBus, kaneFreq * 2, vel * 0.52), 30);
      }
    });

    // ─── 笛フレーズ自動進行（テンポ連動版） ───
    // tempoDetector の confidence が高いほど:
    //   ・音符移動が積極的になる（確信を持って動く）
    //   ・フレーズ間隔が担ぎ手のリズムに引き寄せられる
    //   ・ステップが大きくなる（テンポが安定しているときは跳躍も増える）
    // confidence が低い(テンポ未確立)ときは従来の accMag ベースで漂う
    let fueFreqIdx = Math.min(8 + baseIdx, YO.length - 3);
    function advanceFue() {
      const conf = tempoDetector.effectiveConfidence();

      // 移動確率: テンポが安定しているほど積極的に動く
      const moveProb = 0.30 + conf * 0.45 + S.accMag * 0.18;
      if (Math.random() < moveProb) {
        // confidence が高いとき: 大きなステップ(跳躍)も許可
        const bigStep  = Math.random() < 0.25 + conf * 0.25;
        const step     = bigStep ? 2 : 1;
        const dir      = Math.random() < 0.58 ? 1 : -1;  // 少し上昇傾向
        fueFreqIdx    += dir * step;
        fueFreqIdx     = Math.max(6, Math.min(YO.length - 1, fueFreqIdx));
      }

      const freq = YO[fueFreqIdx];
      if (fueObj && audioCtx) {
        const t = audioCtx.currentTime;
        // テンポが速いほどポルタメントも短く（切れ味が出る）
        const glide = Math.max(0.08, 0.42 - conf * 0.28);
        fueObj.fueOsc.frequency.linearRampToValueAtTime(freq, t + glide);
        fueObj.breathFilt.frequency.linearRampToValueAtTime(freq * 2.2, t + glide * 0.6);

        // 第2笛（4度上でハーモニー）
        if (fue2Obj) {
          const f2idx = Math.max(6, Math.min(fueFreqIdx + 3, YO.length - 1));
          fue2Obj.fueOsc.frequency.linearRampToValueAtTime(YO[f2idx], t + glide * 1.3);
          fue2Obj.breathFilt.frequency.linearRampToValueAtTime(YO[f2idx] * 2.1, t + glide * 0.8);
        }
      }

      // 次の発音タイミング = tempoDetector が提案する間隔（人間的ゆらぎ込み）
      const ms = tempoDetector.getFueInterval(S.accMag);
      setTimeout(advanceFue, ms);
    }
    advanceFue();

    updateLoop();
  }

  // ============================================================
  //  マイク解析
  // ============================================================
  function analyzeMic() {
    if (!micAnalyser) return;
    micAnalyser.getByteFrequencyData(micBuf);
    const avg = micBuf.reduce((s, v) => s + v, 0) / (micBuf.length * 255);
    S.mic = lerp(S.mic, avg * 4, 0.1);
  }

  // ============================================================
  //  毎フレーム更新ループ
  // ============================================================
  function updateLoop() {
    requestAnimationFrame(updateLoop);
    if (!_audioRefs || !audioCtx) return;

    analyzeFrame();
    analyzeMic();

    const t = audioCtx.currentTime;
    const a = _audioRefs;

    // グラニュラー変調
    if (granEngine) {
      granEngine.density = 35 + (1 - Math.min(S.mic, 1)) * 90;
      granEngine.pitch   = 0.88 + S.colorTemp * 0.28;
      granEngine.spread  = 0.5 + S.accMag * 0.5;
    }

    // 環境フィルター
    a.envFilt.frequency.linearRampToValueAtTime(180 + S.mic * 650, t + 0.3);
    a.envGain.gain.linearRampToValueAtTime(0.03 + S.mic * 0.11, t + 0.3);

    // 笛ブレス・ビブラート
    if (fueObj) {
      fueObj.breathGain.gain.linearRampToValueAtTime(0.05 + S.accMag * 0.18, t + 0.2);
      fueObj.vibGain.gain.linearRampToValueAtTime(4 + S.accMag * 13, t + 0.3);
    }

    // リバーブウェット（観客が多いほど豊か）
    a.rvSend.gain.linearRampToValueAtTime(
      0.3 + Math.min(audienceCount / 20, 1) * 0.45, t + 2
    );
  }

  function applyWorldToAudio(s) {
    if (!_audioRefs || !audioCtx) return;
    audienceCount = s.audienceCount;
    const crowd  = Math.min((s.audienceCount  || 0) / 20, 1);
    const energy = Math.min(s.avgAudienceEnergy || 0, 1);
    const t      = audioCtx.currentTime;

    // 観客が盛り上がるほどリバーブが深まる（音が「返ってくる」感覚）
    _audioRefs.rvSend.gain.linearRampToValueAtTime(
      0.28 + crowd * 0.32 + energy * 0.22, t + 1.5
    );

    // 観客エネルギーで笛の音量・ビブラートが活発になる
    if (fueObj) {
      fueObj.fueGain.gain.linearRampToValueAtTime(
        0.18 + energy * 0.16, t + 0.8
      );
      fueObj.vibGain.gain.linearRampToValueAtTime(
        5 + energy * 14, t + 0.6
      );
    }
    if (fue2Obj) {
      fue2Obj.fueGain.gain.linearRampToValueAtTime(
        0.07 + energy * 0.10, t + 0.9
      );
      fue2Obj.vibGain.gain.linearRampToValueAtTime(
        4 + energy * 10, t + 0.7
      );
    }
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  </script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>神輿サウンド – 観客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* 担ぎ手カメラ映像のコンテナ */
    #feeds { position: fixed; inset: 0; }

    /* 各映像セル（JSで位置・サイズを明示指定） */
    .feed-cell {
      position: absolute;
      overflow: hidden;
      background: #000;
    }
    .feed-cell video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .feed-cell video.visible { opacity: 1; }

    /* 担ぎ手ゼロ時 */
    #no-feed {
      position: fixed; inset: 0; z-index: 5;
      background: #080810;
      display: flex; align-items: center; justify-content: center;
      color: rgba(200,210,255,0.25);
      font-size: 0.75rem; letter-spacing: 0.3em;
      font-family: sans-serif;
      transition: opacity 0.8s;
    }
    #no-feed.hidden { opacity: 0; pointer-events: none; }

    /* エフェクト canvas */
    #fx {
      position: fixed; inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 10;
    }

    /* 音声開始用タップオーバーレイ */
    #audio-tap {
      position: fixed;
      bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 20;
      padding: 0.6rem 1.4rem;
      background: rgba(255,220,100,0.12);
      border: 1px solid rgba(255,220,100,0.25);
      border-radius: 999px;
      color: rgba(255,220,100,0.5);
      font-size: 0.7rem; letter-spacing: 0.25em;
      font-family: sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: blink 3s ease-in-out infinite;
    }
    #audio-tap.hidden { display: none; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  </style>
</head>
<body>
  <div id="feeds"></div>
  <div id="no-feed">神輿の接続を待っています…</div>
  <canvas id="fx"></canvas>
  <div id="audio-tap">タップして音声を有効化</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  四七抜き短音階 (D E G A C) 周波数テーブル
  // ============================================================
  const YO = [
    73.42, 82.41, 98.00, 110.00, 130.81,
    146.83, 164.81, 196.00, 220.00, 261.63,
    293.66, 329.63, 392.00, 440.00, 523.25,
    587.33, 659.26, 784.00,
  ];

  // ============================================================
  //  状態
  // ============================================================
  let world = {
    mikoshiCount: 0, audienceCount: 0,
    avgBrightness: 0.5, avgWhiteRatio: 0.3, avgColorTemp: 0.5,
    totalMovement: 0, maxMic: 0, devices: [],
  };

  const feedCells = new Map(); // broadcasterId → { cell, video, pc, audioNodes }
  let audioReady  = false;

  // Web Audio API グローバル
  let audienceCtx        = null;
  let audienceReverb     = null;
  let reverbReturnGain   = null;   // リバーブ戻りゲイン（群衆エネルギーで変調）
  let audienceMaster     = null;
  let audienceComp       = null;
  let padBus             = null;

  // 観客マイク検出
  let audienceMicAnalyser = null;
  let audienceMicBuf      = null;
  let crowdExcitement     = 0;     // 0–1 の平滑化済み群衆エネルギー
  let _lastEnergyEmit     = 0;

  // 音声初期化前に届いた WebRTC 音声トラックをキュー
  const pendingAudioTracks = new Map(); // broadcasterId → MediaStreamTrack

  // ============================================================
  //  Socket.io
  // ============================================================
  const socket = io({ transports: ['websocket'] });

  socket.on('connect', () => {
    socket.emit('join_audience');
  });

  socket.on('world_state', (s) => {
    world = s;
    updateNoFeed(s.mikoshiCount);
    if (audioReady) applyWorldToAudio(s);
  });

  socket.on('broadcaster_arrived', ({ broadcasterId, voiceIndex }) => {
    console.log('[broadcaster_arrived]', broadcasterId);
    startViewing(broadcasterId, voiceIndex);
  });

  socket.on('broadcaster_left', ({ broadcasterId }) => {
    removeFeedCell(broadcasterId);
  });

  // ============================================================
  //  WebRTC: viewer（映像 + グラニュラー音声を受信）
  // ============================================================
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ],
  };

  async function startViewing(broadcasterId, voiceIndex) {
    const existing = feedCells.get(broadcasterId);
    if (existing?.pc) existing.pc.close();

    const pc = new RTCPeerConnection(ICE_CONFIG);
    ensureFeedCell(broadcasterId, voiceIndex, pc);

    // Pillar 2: 映像・音声トラックの振り分け受信
    pc.ontrack = (e) => {
      if (e.track.kind === 'video') {
        // 映像トラック → video要素に接続
        const cell = feedCells.get(broadcasterId);
        if (!cell) return;
        if (e.streams[0]) {
          cell.video.srcObject   = e.streams[0];
          cell.video.autoplay    = true;
          cell.video.muted       = true;
          cell.video.playsInline = true;
          cell.video.play().then(() => {
            cell.video.classList.add('visible');
            updateNoFeed(feedCells.size);
          }).catch(console.warn);
        }
      } else if (e.track.kind === 'audio') {
        // グラニュラー音声トラック → Web Audio API に接続
        if (audioReady && audienceCtx) {
          connectGranularTrack(e.track, broadcasterId);
        } else {
          pendingAudioTracks.set(broadcasterId, e.track);
        }
      }
    };

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice', { to: broadcasterId, ice: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      console.log(`[PC ${broadcasterId.slice(-4)}] ${pc.connectionState}`);
    };

    socket.emit('viewer_request', { broadcasterId });

    socket.once('offer', async ({ from, offer }) => {
      if (from !== broadcasterId) return;
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', { to: broadcasterId, answer });
    });

    socket.on('ice', ({ from, ice }) => {
      if (from !== broadcasterId) return;
      pc.addIceCandidate(new RTCIceCandidate(ice)).catch(() => {});
    });

    const cell = feedCells.get(broadcasterId);
    if (cell) cell.pc = pc;
  }

  // ============================================================
  //  映像セル管理
  // ============================================================
  const feedsEl = document.getElementById('feeds');

  function ensureFeedCell(broadcasterId, voiceIndex, pc) {
    if (feedCells.has(broadcasterId)) return;
    const cell  = document.createElement('div');
    cell.className = 'feed-cell';
    const video = document.createElement('video');
    video.muted = true; video.playsInline = true;
    cell.appendChild(video);
    feedsEl.appendChild(cell);
    feedCells.set(broadcasterId, { cell, video, pc: pc || null, audioNodes: null });
    layoutFeeds();
  }

  function removeFeedCell(broadcasterId) {
    const c = feedCells.get(broadcasterId);
    if (!c) return;
    if (c.pc) c.pc.close();
    // Web Audio ノードのクリーンアップ
    if (c.audioNodes) {
      ['src', 'pan', 'wetGain', 'dryGain'].forEach((k) => {
        try { c.audioNodes[k]?.disconnect(); } catch (_) {}
      });
    }
    c.video.classList.remove('visible');
    setTimeout(() => {
      try { c.cell.remove(); } catch (_) {}
      feedCells.delete(broadcasterId);
      layoutFeeds();
      updateNoFeed(feedCells.size);
    }, 700);
  }

  function layoutFeeds() {
    const cells = Array.from(feedCells.values());
    const n = cells.length;
    const W = window.innerWidth, H = window.innerHeight;
    cells.forEach((c, i) => {
      const s = c.cell.style;
      if (n === 1) {
        s.left = '0'; s.top = '0'; s.width = W+'px'; s.height = H+'px';
      } else if (n === 2) {
        s.left = (i * W/2)+'px'; s.top = '0'; s.width = (W/2)+'px'; s.height = H+'px';
      } else {
        s.left = ((i%2) * W/2)+'px'; s.top = (Math.floor(i/2) * H/2)+'px';
        s.width = (W/2)+'px'; s.height = (H/2)+'px';
      }
    });
    // パンニング位置を再計算
    if (audioReady) recalcPanning();
  }

  window.addEventListener('resize', layoutFeeds);

  function updateNoFeed(count) {
    document.getElementById('no-feed').classList.toggle('hidden', count > 0);
  }

  // 接続失敗セルの定期クリーンアップ
  setInterval(() => {
    for (const [id, c] of feedCells) {
      if (c.pc && (c.pc.connectionState === 'failed' || c.pc.connectionState === 'disconnected')) {
        removeFeedCell(id);
      }
    }
  }, 5000);

  // ============================================================
  //  Pillar 3: ピュア Web Audio API ユーティリティ
  // ============================================================

  // 合成インパルスレスポンスによるコンボリューションリバーブ
  function createConvReverb(ctx, duration, decay) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const ir  = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / (decay * 0.38));
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = ir;
    return conv;
  }

  // 太鼓 ─ ノイズ帯域通過 + サインピッチ感
  function hitTaiko(ctx, output, baseFreq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const bodyBuf = ctx.createBuffer(1, Math.floor(sr * 0.9), sr);
    const bd = bodyBuf.getChannelData(0);
    for (let i = 0; i < bd.length; i++) bd[i] = Math.random() * 2 - 1;
    const bodyNoise = ctx.createBufferSource(); bodyNoise.buffer = bodyBuf;
    const bodyFilt  = ctx.createBiquadFilter();
    bodyFilt.type   = 'bandpass'; bodyFilt.frequency.value = baseFreq * 0.75; bodyFilt.Q.value = 2.2;
    const bodyGain  = ctx.createGain();
    bodyGain.gain.setValueAtTime(vel * 1.7, now);
    bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
    bodyNoise.connect(bodyFilt); bodyFilt.connect(bodyGain); bodyGain.connect(output);
    bodyNoise.start(now); bodyNoise.stop(now + 0.7);
    const skinBuf = ctx.createBuffer(1, Math.floor(sr * 0.06), sr);
    const sd = skinBuf.getChannelData(0);
    for (let i = 0; i < sd.length; i++) sd[i] = Math.random() * 2 - 1;
    const skinNoise = ctx.createBufferSource(); skinNoise.buffer = skinBuf;
    const skinFilt  = ctx.createBiquadFilter();
    skinFilt.type   = 'bandpass'; skinFilt.frequency.value = baseFreq * 5.5; skinFilt.Q.value = 0.9;
    const skinGain  = ctx.createGain();
    skinGain.gain.setValueAtTime(vel * 0.9, now);
    skinGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);
    skinNoise.connect(skinFilt); skinFilt.connect(skinGain); skinGain.connect(output);
    skinNoise.start(now); skinNoise.stop(now + 0.065);
    const toneOsc = ctx.createOscillator(); toneOsc.type = 'sine';
    toneOsc.frequency.setValueAtTime(baseFreq * 1.4, now);
    toneOsc.frequency.exponentialRampToValueAtTime(baseFreq * 0.55, now + 0.28);
    const toneGain = ctx.createGain();
    toneGain.gain.setValueAtTime(vel * 0.45, now);
    toneGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    toneOsc.connect(toneGain); toneGain.connect(output);
    toneOsc.start(now); toneOsc.stop(now + 0.35);
  }

  // 小鼓 (kotsuzumi) — 胴鳴り「ポン」音
  function hitKotsuzumi(ctx, output, freq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.25), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const f  = ctx.createBiquadFilter();
    f.type   = 'bandpass'; f.frequency.value = freq * 2.2; f.Q.value = 5.0;
    const g  = ctx.createGain();
    g.gain.setValueAtTime(vel * 1.3, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.20);
    ns.connect(f); f.connect(g); g.connect(output);
    ns.start(now); ns.stop(now + 0.22);
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 3.8, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.6, now + 0.14);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.60, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.18);
  }

  // 締太鼓 (shime-daiko) — タイトな高域打音
  function hitShimeDaiko(ctx, output, freq, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.10), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const f  = ctx.createBiquadFilter();
    f.type   = 'bandpass'; f.frequency.value = freq * 4.0; f.Q.value = 3.5;
    const g  = ctx.createGain();
    g.gain.setValueAtTime(vel * 1.8, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    ns.connect(f); f.connect(g); g.connect(output);
    ns.start(now); ns.stop(now + 0.10);
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 5.5, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 2.2, now + 0.06);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.70, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.09);
  }

  // 鈴 (suzu) — 揺れる鈴（デチューンしたサイン波クラスター）
  function hitSuzu(ctx, output, baseFreq, vel) {
    const now   = ctx.currentTime;
    const parts = [
      { f: baseFreq,         amp: 0.32, dec: 0.55 },
      { f: baseFreq * 1.005, amp: 0.25, dec: 0.48 },
      { f: baseFreq * 0.997, amp: 0.22, dec: 0.52 },
      { f: baseFreq * 2.010, amp: 0.18, dec: 0.38 },
      { f: baseFreq * 2.008, amp: 0.14, dec: 0.32 },
      { f: baseFreq * 3.012, amp: 0.09, dec: 0.25 },
    ];
    parts.forEach(({ f, amp, dec }, i) => {
      const osc = ctx.createOscillator(); osc.type = 'sine';
      osc.frequency.value = f;
      const g = ctx.createGain();
      g.gain.setValueAtTime(vel * amp, now + i * 0.007);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dec);
      osc.connect(g); g.connect(output);
      osc.start(now + i * 0.007); osc.stop(now + dec + 0.05);
    });
  }

  // 鉦連打 (チンチキチン pattern) — チン・チキ・チン
  function hitKaneBurst(ctx, output, baseFreq, vel) {
    const timings = [0, 105, 185, 330];
    const vels    = [1.0, 0.45, 0.42, 0.88];
    timings.forEach((ms, i) => {
      setTimeout(() => {
        if (!ctx) return;
        hitKane(ctx, output, baseFreq * (1 + (Math.random() - 0.5) * 0.03), vel * vels[i]);
      }, ms);
    });
  }

  // 笛 ─ ブレスノイズ + ビブラート付きサイン
  function createFue(ctx, output) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * 4);
    const nBuf = ctx.createBuffer(1, len, sr);
    const nd   = nBuf.getChannelData(0);
    for (let i = 0; i < len; i++) nd[i] = Math.random() * 2 - 1;
    const noiseNode  = ctx.createBufferSource();
    noiseNode.buffer = nBuf; noiseNode.loop = true;
    const breathFilt = ctx.createBiquadFilter();
    breathFilt.type  = 'bandpass';
    breathFilt.frequency.value = 1400;
    breathFilt.Q.value = 3.5;
    const breathGain = ctx.createGain();
    breathGain.gain.value = 0.07;
    noiseNode.connect(breathFilt); breathFilt.connect(breathGain); breathGain.connect(output);
    noiseNode.start();
    const fueOsc = ctx.createOscillator();
    fueOsc.type  = 'sine';
    fueOsc.frequency.value = 523.25;
    const vibLFO   = ctx.createOscillator();
    vibLFO.type    = 'sine';
    vibLFO.frequency.value = 5.2;
    const vibGain  = ctx.createGain();
    vibGain.gain.value = 6;
    vibLFO.connect(vibGain); vibGain.connect(fueOsc.frequency);
    const fueGain  = ctx.createGain();
    fueGain.gain.value = 0.09;
    fueOsc.connect(fueGain); fueGain.connect(output);
    fueOsc.start(); vibLFO.start();
    return { breathFilt, breathGain, fueOsc, vibLFO, vibGain, fueGain };
  }

  // 鉦（非調和倍音）vel = 音量倍率（デフォルト 1.0）
  function hitKane(ctx, output, baseFreq, vel = 1.0) {
    const now    = ctx.currentTime;
    const ratios = [1, 2.76, 5.40, 8.93];
    const amps   = [1.0, 0.55, 0.28, 0.14];
    const decays = [2.5, 1.8, 1.2, 0.8];
    ratios.forEach((r, i) => {
      const osc = ctx.createOscillator();
      osc.type  = 'sine';
      osc.frequency.value = baseFreq * r;
      const g = ctx.createGain();
      g.gain.setValueAtTime(amps[i] * 0.25 * vel, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + decays[i]);
      osc.connect(g); g.connect(output);
      osc.start(now); osc.stop(now + decays[i] + 0.1);
    });
  }

  // ============================================================
  //  グラニュラー音声トラックを Web Audio API に接続
  //  （担ぎ手ごとに StereoPanner で空間配置）
  // ============================================================
  function connectGranularTrack(track, broadcasterId) {
    if (!audienceCtx || !audienceReverb || !audienceMaster) return;
    try {
      const stream = new MediaStream([track]);
      const src    = audienceCtx.createMediaStreamSource(stream);

      const pan = audienceCtx.createStereoPanner();
      pan.pan.value = calcPan(broadcasterId);

      // ウェット（リバーブ経由）
      const wetGain = audienceCtx.createGain();
      wetGain.gain.value = 0.55;
      // ドライ（直接マスターへ）
      const dryGain = audienceCtx.createGain();
      dryGain.gain.value = 0.28;

      src.connect(pan);
      pan.connect(wetGain); wetGain.connect(audienceReverb);
      pan.connect(dryGain); dryGain.connect(audienceMaster);

      const cell = feedCells.get(broadcasterId);
      if (cell) cell.audioNodes = { src, pan, wetGain, dryGain };

      console.log(`[audio] ${broadcasterId.slice(-4)} グラニュラー接続 pan=${pan.pan.value.toFixed(2)}`);
    } catch (e) {
      console.warn('[audio] connectGranularTrack:', e);
    }
  }

  // 担ぎ手の数と順番からパン位置を計算（-0.7 ～ +0.7）
  function calcPan(broadcasterId) {
    const keys = Array.from(feedCells.keys());
    const idx  = keys.indexOf(broadcasterId);
    const n    = keys.length;
    if (n <= 1) return 0;
    return ((idx / (n - 1)) * 2 - 1) * 0.7;
  }

  // レイアウト変更時にパンを再計算
  function recalcPanning() {
    const keys = Array.from(feedCells.keys());
    keys.forEach((bid, idx) => {
      const cell = feedCells.get(bid);
      if (cell?.audioNodes?.pan) {
        const pan = (keys.length <= 1) ? 0 : ((idx / (keys.length - 1)) * 2 - 1) * 0.7;
        cell.audioNodes.pan.pan.linearRampToValueAtTime(
          pan, audienceCtx.currentTime + 0.5
        );
      }
    });
  }

  // ============================================================
  //  音声初期化（ユーザータップ後）
  // ============================================================
  const audioTapEl = document.getElementById('audio-tap');
  audioTapEl.addEventListener('pointerdown', async () => {
    audioTapEl.classList.add('hidden');
    await initAudio();
  }, { once: true });

  async function initAudio() {
    audienceCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── ルーティング ───
    //   pad / bells → audienceReverb → audienceMaster → destination
    //   granularTrack → pan → wetGain → audienceReverb
    //                      → dryGain → audienceMaster
    audienceMaster = audienceCtx.createGain();
    audienceMaster.gain.value = 0.80;
    audienceMaster.connect(audienceCtx.destination);

    audienceComp = audienceCtx.createDynamicsCompressor();
    audienceComp.threshold.value = -14; audienceComp.ratio.value = 4;
    audienceComp.attack.value = 0.004; audienceComp.release.value = 0.2;
    audienceComp.connect(audienceMaster);

    audienceReverb   = createConvReverb(audienceCtx, 4.5, 3.2);
    reverbReturnGain = audienceCtx.createGain();
    reverbReturnGain.gain.value = 0.70;
    // reverb → reverbReturnGain → master（群衆エネルギーで wet 深さを変調）
    audienceReverb.connect(reverbReturnGain);
    reverbReturnGain.connect(audienceMaster);

    // ─── アンビエントパッド（6声、四七抜き倍音を重ねる） ───
    const aidx = parseInt(socket.id.slice(-4), 16) % 3;
    // 四七抜き音階に基づく 6声和音（低音＋中音＋上方倍音）
    const chords = [
      [196.00, 293.66, 392.00, 440.00, 587.33, 784.00],  // G3, D4, G4, A4, D5, G5
      [220.00, 329.63, 440.00, 523.25, 659.26, 880.00],  // A3, E4, A4, C5, E5, A5
      [146.83, 220.00, 293.66, 392.00, 440.00, 587.33],  // D3, A3, D4, G4, A4, D5
    ];
    const freqs = chords[aidx];

    padBus = audienceCtx.createGain();
    padBus.gain.setValueAtTime(0, audienceCtx.currentTime);
    padBus.gain.linearRampToValueAtTime(0.13, audienceCtx.currentTime + 3.5);
    padBus.connect(audienceReverb);

    freqs.forEach((f, i) => {
      const osc = audienceCtx.createOscillator();
      // 下3声は sine、上3声は triangle（倍音豊かで広がり感）
      osc.type  = i < 3 ? 'sine' : 'triangle';
      osc.frequency.value = f;

      // ゆっくりした振幅変調（各声で異なる周期）
      const modOsc   = audienceCtx.createOscillator();
      modOsc.type    = 'sine';
      modOsc.frequency.value = 0.015 + i * 0.011;
      const modDepth = audienceCtx.createGain();
      modDepth.gain.value = 0.18;

      const oscGain  = audienceCtx.createGain();
      // 上の声ほど小さめ
      oscGain.gain.value = (0.90 - i * 0.08) / freqs.length;

      modOsc.connect(modDepth);
      modDepth.connect(oscGain.gain);
      osc.connect(oscGain);
      oscGain.connect(padBus);
      osc.start(); modOsc.start();
    });

    // 環境ノイズテクスチャ（薄いざわめき）
    const envBuf = audienceCtx.createBuffer(1, audienceCtx.sampleRate * 4, audienceCtx.sampleRate);
    const ed = envBuf.getChannelData(0);
    for (let i = 0; i < ed.length; i++) ed[i] = Math.random() * 2 - 1;
    const envSrc  = audienceCtx.createBufferSource();
    envSrc.buffer = envBuf; envSrc.loop = true;
    const envFilt = audienceCtx.createBiquadFilter();
    envFilt.type  = 'bandpass'; envFilt.frequency.value = 600; envFilt.Q.value = 1.0;
    const envGain = audienceCtx.createGain(); envGain.gain.value = 0.04;
    envSrc.connect(envFilt); envFilt.connect(envGain); envGain.connect(audienceReverb);
    envSrc.start();

    // ─── 笛アンビエントテクスチャ ───
    const audFueObj = createFue(audienceCtx, audienceReverb);
    audFueObj.fueGain.gain.value   = 0.08;
    audFueObj.breathGain.gain.value = 0.04;
    audFueObj.vibGain.gain.value   = 6;

    // 笛の自律的音符進行（ゆっくり漂う）
    let audFueIdx = 7;
    function advanceAudFue() {
      if (!audienceCtx) return;
      const move = Math.min(world.totalMovement / 4, 1);
      if (Math.random() < 0.45 + move * 0.30) {
        audFueIdx += Math.random() < 0.55 ? 1 : -1;
        audFueIdx  = Math.max(5, Math.min(YO.length - 1, audFueIdx));
      }
      const t = audienceCtx.currentTime;
      audFueObj.fueOsc.frequency.linearRampToValueAtTime(YO[audFueIdx], t + 0.5);
      audFueObj.breathFilt.frequency.linearRampToValueAtTime(YO[audFueIdx] * 2.1, t + 0.3);
      // 担ぎ手がいないときはゆっくり動く
      const ms = world.mikoshiCount > 0
        ? 450 + Math.random() * 1000 + (1 - move) * 700
        : 1500 + Math.random() * 2000;
      setTimeout(advanceAudFue, ms);
    }
    advanceAudFue();

    // 第2笛（ハーモニー）
    const audFue2Obj = createFue(audienceCtx, audienceReverb);
    audFue2Obj.fueGain.gain.value    = 0.05;
    audFue2Obj.breathGain.gain.value = 0.025;
    audFue2Obj.fueOsc.frequency.value = YO[Math.min(audFueIdx + 3, YO.length - 1)];

    // ─── 鉦ループ（複数の鉦が異なるタイミングで鳴る）───
    const kaneFreqSet = [146.83, 196.00, 220.00, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
    let kaneBeat = 0;
    function ringBells() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      const move   = Math.min(world.totalMovement / 4, 1);
      const gap    = world.mikoshiCount > 0
        ? Math.max(200, 800 - energy * 550 - move * 180) + Math.random() * 700
        : 2800 + Math.random() * 2200;

      setTimeout(() => {
        if (world.mikoshiCount > 0 && audienceCtx) {
          kaneBeat++;
          const vel = 0.52 + energy * 0.48;

          // 鉦 1音目
          const bf1 = kaneFreqSet[Math.floor(Math.random() * kaneFreqSet.length)];
          hitKane(audienceCtx, audienceReverb, bf1 * (0.88 + world.avgColorTemp * 0.24), vel);

          // 鉦 2音目（少し遅れて重ねる）
          if (Math.random() < 0.60) {
            setTimeout(() => {
              const bf2 = kaneFreqSet[Math.floor(Math.random() * kaneFreqSet.length)];
              hitKane(audienceCtx, audienceReverb, bf2, vel * 0.62);
            }, 130 + Math.random() * 180 | 0);
          }

          // 鈴（盛り上がり時）
          if (energy > 0.40 && Math.random() < 0.42) {
            setTimeout(() => hitSuzu(audienceCtx, audienceReverb, 523.25, vel * 0.42), 70);
          }

          // 鉦連打 チンチキチン: 4拍ごと
          if (kaneBeat % 4 === 0) {
            setTimeout(() => hitKaneBurst(audienceCtx, audienceReverb,
              kaneFreqSet[Math.floor(Math.random() * kaneFreqSet.length)], vel * 0.55), 280);
          }

          // 観客がとても盛り上がったら3音同時
          if (energy > 0.65 && Math.random() < 0.35) {
            setTimeout(() => {
              const bf3 = kaneFreqSet[Math.floor(Math.random() * kaneFreqSet.length)];
              hitKane(audienceCtx, audienceReverb, bf3, vel * 0.45);
            }, 240 + Math.random() * 160 | 0);
          }
        }
        ringBells();
      }, gap);
    }
    ringBells();

    // 追加の鉦ループ（低い周波数帯、別テンポ）
    function ringDeepBell() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      const gap = world.mikoshiCount > 0
        ? Math.max(500, 1800 - energy * 900) + Math.random() * 1200
        : 5000 + Math.random() * 3000;
      setTimeout(() => {
        if (world.mikoshiCount > 0 && audienceCtx) {
          const lowFreqs = [73.42, 82.41, 98.00, 110.00, 146.83];
          const bf = lowFreqs[Math.floor(Math.random() * lowFreqs.length)];
          hitKane(audienceCtx, audienceReverb, bf, 0.45 + energy * 0.35);
        }
        ringDeepBell();
      }, gap);
    }
    ringDeepBell();

    // ─── 打楽器アンビエントループ ───
    // 太鼓・小鼓・締太鼓が散発的に聴こえる（神輿の響きが会場に届く感覚）
    const percBaseFreq = freqs[0] * 0.5;  // pad の基音と揃える
    function percLoop() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      const move   = Math.min(world.totalMovement / 4, 1);
      const vel    = 0.10 + move * 0.25 + energy * 0.15;

      if (world.mikoshiCount > 0) {
        // 太鼓
        if (Math.random() < 0.62) {
          hitTaiko(audienceCtx, audienceComp, percBaseFreq, vel * 0.75);
        }
        // 小鼓（遅れて）
        if (Math.random() < 0.55) {
          setTimeout(() => hitKotsuzumi(audienceCtx, audienceComp, percBaseFreq * 2.5, vel * 0.58),
                     (180 + Math.random() * 220) | 0);
        }
        // 締太鼓フィル
        if (Math.random() < 0.42) {
          setTimeout(() => hitShimeDaiko(audienceCtx, audienceComp, percBaseFreq, vel * 0.52),
                     (380 + Math.random() * 300) | 0);
        }
        // 鈴（盛り上がり時）
        if (energy > 0.35 && Math.random() < 0.38) {
          setTimeout(() => hitSuzu(audienceCtx, audienceComp, 440, vel * 0.38),
                     (90 + Math.random() * 140) | 0);
        }
        // 小鼓 2発目（より密に）
        if (move > 0.5 && Math.random() < 0.48) {
          setTimeout(() => hitKotsuzumi(audienceCtx, audienceComp, percBaseFreq * 2.5, vel * 0.42),
                     (550 + Math.random() * 200) | 0);
        }
      }

      const gap = world.mikoshiCount > 0
        ? Math.max(280, 650 - energy * 350 - move * 150) + Math.random() * 550
        : 3500 + Math.random() * 2500;
      setTimeout(percLoop, gap);
    }
    percLoop();

    audioReady = true;

    // 音声初期化前に届いていたトラックを接続
    for (const [bid, track] of pendingAudioTracks) {
      connectGranularTrack(track, bid);
    }
    pendingAudioTracks.clear();

    // ─── 観客マイク検出（任意：拒否されても動作継続） ───
    try {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false },
        video: false,
      });
      audienceMicAnalyser = audienceCtx.createAnalyser();
      audienceMicAnalyser.fftSize = 256;
      audienceMicAnalyser.smoothingTimeConstant = 0.35;
      audienceCtx.createMediaStreamSource(micStream).connect(audienceMicAnalyser);
      audienceMicBuf = new Uint8Array(audienceMicAnalyser.frequencyBinCount);
      console.log('[audience] マイク検出有効');
    } catch (e) {
      console.log('[audience] マイク無効（検出なしで継続）:', e.message);
    }
    startCrowdLoop();
  }

  // ============================================================
  //  観客マイク解析 — 歓声・拍手スコアを 0-1 で返す
  // ============================================================
  function analyzeCrowd() {
    if (!audienceMicAnalyser || !audienceMicBuf) return 0;
    audienceMicAnalyser.getByteFrequencyData(audienceMicBuf);

    const n         = audienceMicBuf.length;
    const hzPerBin  = (audienceCtx.sampleRate / 2) / n;
    let total = 0, midSum = 0, highSum = 0, midN = 0, highN = 0;

    for (let i = 0; i < n; i++) {
      const hz = i * hzPerBin;
      const v  = audienceMicBuf[i] / 255;
      total += v;
      if (hz >= 300 && hz < 2500) { midSum  += v; midN++;  }  // 声域
      if (hz >= 2500)              { highSum += v; highN++; }  // 拍手・歓声の倍音
    }

    const overall = total / n;
    const mid  = midN  > 0 ? midSum  / midN  : 0;
    const high = highN > 0 ? highSum / highN : 0;

    // 声 0.45 + 拍手高域 0.30 + 全体 0.25 の加重和
    const score = overall * 0.25 + mid * 0.45 + high * 0.30;
    return Math.min(1, score * 4.2);
  }

  // ============================================================
  //  群衆ループ — 毎フレーム解析 → 音響反映 → サーバーへ送信
  // ============================================================
  function startCrowdLoop() {
    const tick = () => {
      if (!audioReady || !audienceCtx) { requestAnimationFrame(tick); return; }

      const raw = analyzeCrowd();
      // 盛り上がりは素早く上昇、落ち着きは緩やかに（拍手の歯切れを残す）
      const rate = raw > crowdExcitement ? 0.08 : 0.022;
      crowdExcitement = lerp(crowdExcitement, raw, rate);

      const t  = audienceCtx.currentTime;
      const ce = crowdExcitement;

      // リバーブリターンゲイン（観客が湧くと空間が広がる感覚）
      if (reverbReturnGain) {
        reverbReturnGain.gain.linearRampToValueAtTime(
          0.60 + ce * 0.55, t + 0.35
        );
      }

      // パッド音量（観客の声に呼応して膨らむ）
      if (padBus && world.mikoshiCount > 0) {
        padBus.gain.linearRampToValueAtTime(
          0.10 + ce * 0.22, t + 0.5
        );
      }

      // マスターゲイン
      if (audienceMaster) {
        audienceMaster.gain.linearRampToValueAtTime(
          0.72 + ce * 0.18, t + 0.4
        );
      }

      // サーバーへ 200ms 間隔で送信
      const now = performance.now();
      if (now - _lastEnergyEmit > 200) {
        _lastEnergyEmit = now;
        socket.emit('audience_energy', { level: Math.round(ce * 1000) / 1000 });
      }

      requestAnimationFrame(tick);
    };
    tick();
  }

  // ============================================================
  //  ワールドステート → 音響反映
  // ============================================================
  function applyWorldToAudio(s) {
    if (!audienceCtx || !audienceMaster) return;
    const move   = Math.min(s.totalMovement / 4, 1);
    const energy = Math.min(s.avgAudienceEnergy || 0, 1);
    const t      = audienceCtx.currentTime;

    // 担ぎ手がいない場合はパッドをフェードダウン
    if (padBus) {
      const targetPad = s.mikoshiCount === 0
        ? 0.04
        : 0.10 + move * 0.08 + energy * 0.06;
      padBus.gain.linearRampToValueAtTime(targetPad, t + 2.5);
    }

    // 観客エネルギーで全体音量が上がる
    if (audienceMaster) {
      audienceMaster.gain.linearRampToValueAtTime(
        0.72 + energy * 0.18, t + 1.0
      );
    }
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  // ============================================================
  //  エフェクト canvas（波紋）
  // ============================================================
  (function startFx() {
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    let W, H;
    const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const ripples = [];
    let lastRipple = 0;

    function loop() {
      requestAnimationFrame(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, 0, W, H);

      const { devices, totalMovement, avgBrightness, avgColorTemp } = world;
      const now = performance.now();
      const gap = Math.max(120, 750 - totalMovement * 60);

      if (devices.length > 0 && now - lastRipple > gap) {
        lastRipple = now;
        devices.forEach((d, i) => {
          const angle = (i / Math.max(devices.length, 1)) * Math.PI * 2;
          const cx    = W * 0.5 + Math.cos(angle) * W * 0.2;
          const cy    = H * 0.5 + Math.sin(angle) * H * 0.18;
          const hue   = avgColorTemp * 50 + 10;
          const maxR  = 90 + (d.accMagnitude || 0.2) * 260 + (d.micLevel || 0) * 100;
          ripples.push({ x: cx, y: cy, r: 5, maxR, alpha: 0.4, hue });
        });
      }
      if (devices.length === 0 && now - lastRipple > 3000) {
        lastRipple = now;
        ripples.push({ x: W * 0.5, y: H * 0.5, r: 5, maxR: 70, alpha: 0.3, hue: 210 });
      }

      const speed = 1.3 + totalMovement * 0.75;
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += speed; rp.alpha -= 0.004;
        if (rp.alpha <= 0 || rp.r > rp.maxR) { ripples.splice(i, 1); continue; }
        const prog = 1 - rp.r / rp.maxR;
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${rp.hue},85%,65%,${rp.alpha * prog})`;
        ctx.lineWidth   = 1.5 * prog * 2.5;
        ctx.stroke();
      }
      if (Math.random() < 0.06 * (0.5 + avgBrightness)) {
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${avgColorTemp * 40 + 20},70%,88%,${Math.random() * 0.3})`;
        ctx.fill();
      }
    }
    loop();
  })();
  </script>

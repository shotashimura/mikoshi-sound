<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>神輿サウンド – 観客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* 担ぎ手カメラ映像のコンテナ */
    #feeds { position: fixed; inset: 0; }

    /* 各映像セル（JSで位置・サイズを明示指定） */
    .feed-cell {
      position: absolute;
      overflow: hidden;
      background: #000;
    }
    .feed-cell video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .feed-cell video.visible { opacity: 1; }

    /* 担ぎ手ゼロ時 */
    #no-feed {
      position: fixed; inset: 0; z-index: 5;
      background: #080810;
      display: flex; align-items: center; justify-content: center;
      color: rgba(200,210,255,0.25);
      font-size: 0.75rem; letter-spacing: 0.3em;
      font-family: sans-serif;
      transition: opacity 0.8s;
    }
    #no-feed.hidden { opacity: 0; pointer-events: none; }

    /* エフェクト canvas */
    #fx {
      position: fixed; inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 10;
    }

    /* 音声開始用タップオーバーレイ */
    #audio-tap {
      position: fixed;
      bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 20;
      padding: 0.6rem 1.4rem;
      background: rgba(255,220,100,0.12);
      border: 1px solid rgba(255,220,100,0.25);
      border-radius: 999px;
      color: rgba(255,220,100,0.5);
      font-size: 0.7rem; letter-spacing: 0.25em;
      font-family: sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: blink 3s ease-in-out infinite;
    }
    #audio-tap.hidden { display: none; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  </style>
</head>
<body>
  <div id="feeds"></div>
  <div id="no-feed">神輿の接続を待っています…</div>
  <canvas id="fx"></canvas>
  <div id="audio-tap">タップして音声を有効化</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  G メジャー + コード進行 (Oasis アンセム仕様)
  //  G - D - Em - Cadd9 (I-V-vi-IV、Wonderwall 系)
  // ============================================================
  const CHORDS = {
    G: {
      bassNotes: [49.00, 73.42, 98.00, 123.47],
      voicing:  [196.00, 246.94, 293.66, 392.00, 493.88],
      lead:     [329.63, 392.00, 440.00, 493.88, 587.33, 659.26],
    },
    D: {
      bassNotes: [73.42, 110.00, 146.83, 184.997],
      voicing:  [146.83, 184.997, 220.00, 293.66, 369.99],
      lead:     [369.99, 440.00, 493.88, 587.33, 659.26, 739.99],
    },
    Em: {
      bassNotes: [82.41, 123.47, 164.81, 196.00],
      voicing:  [164.81, 196.00, 246.94, 329.63, 392.00],
      lead:     [329.63, 392.00, 440.00, 493.88, 587.33, 659.26],
    },
    Cadd9: {
      bassNotes: [65.41, 98.00, 130.81, 164.81],
      voicing:  [130.81, 164.81, 196.00, 261.63, 293.66],
      lead:     [329.63, 392.00, 440.00, 493.88, 523.25, 659.26],
    },
    Am: {
      bassNotes: [55.00, 82.41, 110.00, 130.81],
      voicing:  [110.00, 130.81, 164.81, 220.00, 261.63],
      lead:     [329.63, 392.00, 440.00, 493.88, 523.25, 659.26],
    },
    F: {
      bassNotes: [43.65, 65.41, 87.31, 110.00],
      voicing:  [87.31, 130.81, 174.61, 220.00, 261.63],
      lead:     [349.23, 440.00, 523.25, 587.33, 659.26, 698.46],
    },
    C: {
      bassNotes: [65.41, 98.00, 130.81, 164.81],
      voicing:  [130.81, 164.81, 196.00, 261.63, 329.63],
      lead:     [329.63, 392.00, 440.00, 493.88, 523.25, 659.26],
    },
  };

  // ─── SONGS: 4 曲を 3:30 ごとに循環 (Oasis アンセム集) ───
  const SONGS = [
    { name: 'Wonderwall',     progression: ['G','D','Em','Cadd9'], tonic: 49.00,
      drive: 22, tone: 2700 },
    { name: 'Live Forever',   progression: ['G','D','Am','C'],     tonic: 49.00,
      drive: 32, tone: 3500 },
    { name: 'Anger',          progression: ['C','G','Am','F'],     tonic: 65.41,
      drive: 16, tone: 2200 },
    { name: 'RocknRoll Star', progression: ['G','F','G','F'],      tonic: 49.00,
      drive: 44, tone: 4200 },
  ];
  const SONG_DURATION_MS = 210000;

  let _activeSongIdx     = 0;
  let _activeProgression = SONGS[0].progression;
  let _activeDrive       = SONGS[0].drive;
  let _activeTone        = SONGS[0].tone;
  let _pendingSongIdx    = 0;
  let _audApplySong      = null;

  // ============================================================
  //  状態
  // ============================================================
  let world = {
    mikoshiCount: 0, audienceCount: 0,
    avgBrightness: 0.5, avgWhiteRatio: 0.3, avgColorTemp: 0.5,
    totalMovement: 0, maxMic: 0, devices: [],
  };

  const feedCells = new Map(); // broadcasterId → { cell, video, pc, audioNodes }
  let audioReady  = false;

  // Web Audio API グローバル
  let audienceCtx        = null;
  let audienceReverb     = null;
  let reverbReturnGain   = null;   // リバーブ戻りゲイン（群衆エネルギーで変調）
  let audienceMaster     = null;
  let audienceComp       = null;
  let padBus             = null;

  // 観客マイク検出
  let audienceMicAnalyser = null;
  let audienceMicBuf      = null;
  let crowdExcitement     = 0;     // 0–1 の平滑化済み群衆エネルギー
  let _lastEnergyEmit     = 0;

  // 音声初期化前に届いた WebRTC 音声トラックをキュー
  const pendingAudioTracks = new Map(); // broadcasterId → MediaStreamTrack

  // ============================================================
  //  Socket.io
  // ============================================================
  const socket = io({ transports: ['websocket'] });

  socket.on('connect', () => {
    socket.emit('join_audience');
  });

  // サーバーが曲を切り替えたら追従 (新規接続時にも現在の曲が即届く)
  socket.on('song_change', ({ songIdx }) => {
    const idx = ((songIdx % SONGS.length) + SONGS.length) % SONGS.length;
    _pendingSongIdx = idx;
    if (_audApplySong) _audApplySong(idx);
  });

  socket.on('world_state', (s) => {
    world = s;
    updateNoFeed(s.mikoshiCount);
    if (audioReady) applyWorldToAudio(s);
  });

  socket.on('broadcaster_arrived', ({ broadcasterId, voiceIndex }) => {
    console.log('[broadcaster_arrived]', broadcasterId);
    startViewing(broadcasterId, voiceIndex);
  });

  socket.on('broadcaster_left', ({ broadcasterId }) => {
    removeFeedCell(broadcasterId);
  });

  // ============================================================
  //  WebRTC: viewer（映像 + グラニュラー音声を受信）
  // ============================================================
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ],
  };

  async function startViewing(broadcasterId, voiceIndex) {
    const existing = feedCells.get(broadcasterId);
    if (existing?.pc) existing.pc.close();

    const pc = new RTCPeerConnection(ICE_CONFIG);
    ensureFeedCell(broadcasterId, voiceIndex, pc);

    // Pillar 2: 映像・音声トラックの振り分け受信
    pc.ontrack = (e) => {
      if (e.track.kind === 'video') {
        // 映像トラック → video要素に接続
        const cell = feedCells.get(broadcasterId);
        if (!cell) return;
        if (e.streams[0]) {
          cell.video.srcObject   = e.streams[0];
          cell.video.autoplay    = true;
          cell.video.muted       = true;
          cell.video.playsInline = true;
          cell.video.play().then(() => {
            cell.video.classList.add('visible');
            updateNoFeed(feedCells.size);
          }).catch(console.warn);
        }
      } else if (e.track.kind === 'audio') {
        // グラニュラー音声トラック → Web Audio API に接続
        if (audioReady && audienceCtx) {
          connectGranularTrack(e.track, broadcasterId);
        } else {
          pendingAudioTracks.set(broadcasterId, e.track);
        }
      }
    };

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice', { to: broadcasterId, ice: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      console.log(`[PC ${broadcasterId.slice(-4)}] ${pc.connectionState}`);
    };

    socket.emit('viewer_request', { broadcasterId });

    socket.once('offer', async ({ from, offer }) => {
      if (from !== broadcasterId) return;
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', { to: broadcasterId, answer });
    });

    socket.on('ice', ({ from, ice }) => {
      if (from !== broadcasterId) return;
      pc.addIceCandidate(new RTCIceCandidate(ice)).catch(() => {});
    });

    const cell = feedCells.get(broadcasterId);
    if (cell) cell.pc = pc;
  }

  // ============================================================
  //  映像セル管理
  // ============================================================
  const feedsEl = document.getElementById('feeds');

  function ensureFeedCell(broadcasterId, voiceIndex, pc) {
    if (feedCells.has(broadcasterId)) return;
    const cell  = document.createElement('div');
    cell.className = 'feed-cell';
    const video = document.createElement('video');
    video.muted = true; video.playsInline = true;
    cell.appendChild(video);
    feedsEl.appendChild(cell);
    feedCells.set(broadcasterId, { cell, video, pc: pc || null, audioNodes: null });
    layoutFeeds();
  }

  function removeFeedCell(broadcasterId) {
    const c = feedCells.get(broadcasterId);
    if (!c) return;
    if (c.pc) c.pc.close();
    // Web Audio ノードのクリーンアップ
    if (c.audioNodes) {
      ['src', 'pan', 'wetGain', 'dryGain'].forEach((k) => {
        try { c.audioNodes[k]?.disconnect(); } catch (_) {}
      });
    }
    c.video.classList.remove('visible');
    setTimeout(() => {
      try { c.cell.remove(); } catch (_) {}
      feedCells.delete(broadcasterId);
      layoutFeeds();
      updateNoFeed(feedCells.size);
    }, 700);
  }

  function layoutFeeds() {
    const cells = Array.from(feedCells.values());
    const n = cells.length;
    const W = window.innerWidth, H = window.innerHeight;
    cells.forEach((c, i) => {
      const s = c.cell.style;
      if (n === 1) {
        s.left = '0'; s.top = '0'; s.width = W+'px'; s.height = H+'px';
      } else if (n === 2) {
        s.left = (i * W/2)+'px'; s.top = '0'; s.width = (W/2)+'px'; s.height = H+'px';
      } else {
        s.left = ((i%2) * W/2)+'px'; s.top = (Math.floor(i/2) * H/2)+'px';
        s.width = (W/2)+'px'; s.height = (H/2)+'px';
      }
    });
    // パンニング位置を再計算
    if (audioReady) recalcPanning();
  }

  window.addEventListener('resize', layoutFeeds);

  function updateNoFeed(count) {
    document.getElementById('no-feed').classList.toggle('hidden', count > 0);
  }

  // 接続失敗セルの定期クリーンアップ
  setInterval(() => {
    for (const [id, c] of feedCells) {
      if (c.pc && (c.pc.connectionState === 'failed' || c.pc.connectionState === 'disconnected')) {
        removeFeedCell(id);
      }
    }
  }, 5000);

  // ============================================================
  //  Pillar 3: ピュア Web Audio API ロックキット
  //  観客側は「会場で遠くから聴こえる」ニュアンスでアンビエント寄り。
  // ============================================================

  // 合成インパルスレスポンスによるコンボリューションリバーブ
  function createConvReverb(ctx, duration, decay) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const ir  = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / (decay * 0.38));
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = ir;
    return conv;
  }

  // ─── ディストーション波形カーブ ───
  function makeDistortionCurve(amount = 50) {
    const n = 4096;
    const curve = new Float32Array(n);
    const k = amount;
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }

  // ─── Karplus-Strong プラック弦合成 ───
  function pluckBuffer(ctx, freq, duration = 1.6, decay = 0.997) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const N   = Math.max(2, Math.floor(sr / freq));
    const buf = ctx.createBuffer(1, len, sr);
    const out = buf.getChannelData(0);
    const ring = new Float32Array(N);
    for (let i = 0; i < N; i++) ring[i] = (Math.random() * 2 - 1);
    let p = 0;
    for (let i = 0; i < len; i++) {
      const cur = ring[p];
      const nxt = ring[(p + 1) % N];
      out[i]   = cur;
      ring[p]  = (cur + nxt) * 0.5 * decay;
      p = (p + 1) % N;
    }
    return buf;
  }

  // ─── ギター単音 (3声トリプルトラッキング: L/C/R デチューン) ───
  function pickGuitar(ctx, amps, freq, vel, dur = 1.0) {
    const voices = [
      { detune: 0.997, delay: 0.012, gain: 0.55, ampIdx: 0 },  // L
      { detune: 1.000, delay: 0.000, gain: 0.65, ampIdx: 1 },  // C
      { detune: 1.003, delay: 0.020, gain: 0.55, ampIdx: 2 },  // R
    ];
    voices.forEach((v) => {
      const start = ctx.currentTime + v.delay;
      const buf   = pluckBuffer(ctx, freq * v.detune, dur, 0.996);
      const src   = ctx.createBufferSource(); src.buffer = buf;
      const env   = ctx.createGain();
      env.gain.setValueAtTime(0, start);
      env.gain.linearRampToValueAtTime(vel * v.gain, start + 0.005);
      env.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      src.connect(env); env.connect(amps[v.ampIdx].inp);
      src.start(start); src.stop(start + dur + 0.05);
    });
  }

  // ─── ギターアンプチャンネル (L/C/R 別々の歪みチェーン) ───
  function makeGuitarAmp(ctx, panValue, distortAmount) {
    const inp  = ctx.createGain(); inp.gain.value = 1.0;
    const dist = ctx.createWaveShaper();
    dist.curve = makeDistortionCurve(distortAmount);
    dist.oversample = '4x';
    const tone = ctx.createBiquadFilter();
    tone.type  = 'lowpass'; tone.frequency.value = 2800; tone.Q.value = 0.8;
    const pan  = ctx.createStereoPanner(); pan.pan.value = panValue;
    inp.connect(dist); dist.connect(tone); tone.connect(pan);
    return { inp, dist, tone, pan };
  }

  // ─── ベースノート ───
  function playBass(ctx, ampInput, freq, vel, dur = 0.5) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type  = 'sawtooth'; osc.frequency.value = freq;
    const sub = ctx.createOscillator();
    sub.type  = 'sine'; sub.frequency.value = freq * 0.5;
    const lp  = ctx.createBiquadFilter();
    lp.type   = 'lowpass'; lp.Q.value = 2.5;
    lp.frequency.setValueAtTime(freq * 7, now);
    lp.frequency.exponentialRampToValueAtTime(freq * 2.4, now + dur * 0.5);
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vel * 0.55, now + 0.006);
    env.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    const subEnv = ctx.createGain();
    subEnv.gain.setValueAtTime(0, now);
    subEnv.gain.linearRampToValueAtTime(vel * 0.30, now + 0.008);
    subEnv.gain.exponentialRampToValueAtTime(0.0001, now + dur * 0.9);
    osc.connect(lp); lp.connect(env); env.connect(ampInput);
    sub.connect(subEnv); subEnv.connect(ampInput);
    osc.start(now); osc.stop(now + dur + 0.05);
    sub.start(now); sub.stop(now + dur + 0.05);
  }

  // ─── キックドラム ───
  function hitKick(ctx, output, vel) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type  = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(38, now + 0.09);
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * 1.2, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
    osc.connect(env); env.connect(output);
    osc.start(now); osc.stop(now + 0.45);
  }

  // ─── スネア ───
  function hitSnare(ctx, output, vel) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type  = 'triangle';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(140, now + 0.08);
    const og = ctx.createGain();
    og.gain.setValueAtTime(vel * 0.45, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    osc.connect(og); og.connect(output);
    osc.start(now); osc.stop(now + 0.15);
    const sr = ctx.sampleRate;
    const nb = ctx.createBuffer(1, Math.floor(sr * 0.18), sr);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns = ctx.createBufferSource(); ns.buffer = nb;
    const nf = ctx.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 850;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.85, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    ns.connect(nf); nf.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + 0.18);
  }

  // ─── ハイハット ───
  function hitHihat(ctx, output, vel, open = false) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const dur = open ? 0.24 : 0.045;
    const nb  = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns  = ctx.createBufferSource(); ns.buffer = nb;
    const nf  = ctx.createBiquadFilter();
    nf.type = 'highpass'; nf.frequency.value = 7200;
    const nf2 = ctx.createBiquadFilter();
    nf2.type = 'bandpass'; nf2.frequency.value = 9500; nf2.Q.value = 0.5;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.42, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    ns.connect(nf); nf.connect(nf2); nf2.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + dur + 0.01);
  }

  // ─── クラッシュシンバル ───
  function hitCrash(ctx, output, vel) {
    const now = ctx.currentTime;
    const sr  = ctx.sampleRate;
    const dur = 1.7;
    const nb  = ctx.createBuffer(1, Math.floor(sr * dur), sr);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const ns  = ctx.createBufferSource(); ns.buffer = nb;
    const nf  = ctx.createBiquadFilter();
    nf.type = 'highpass'; nf.frequency.value = 4000;
    const ng  = ctx.createGain();
    ng.gain.setValueAtTime(vel * 0.55, now);
    ng.gain.exponentialRampToValueAtTime(0.06, now + 0.06);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    ns.connect(nf); nf.connect(ng); ng.connect(output);
    ns.start(now); ns.stop(now + dur + 0.02);
  }

  // ============================================================
  //  グラニュラー音声トラックを Web Audio API に接続
  //  （担ぎ手ごとに StereoPanner で空間配置）
  // ============================================================
  function connectGranularTrack(track, broadcasterId) {
    if (!audienceCtx || !audienceReverb || !audienceMaster) return;
    try {
      const stream = new MediaStream([track]);
      const src    = audienceCtx.createMediaStreamSource(stream);

      const pan = audienceCtx.createStereoPanner();
      pan.pan.value = calcPan(broadcasterId);

      // ウェット（リバーブ経由）
      const wetGain = audienceCtx.createGain();
      wetGain.gain.value = 0.55;
      // ドライ（直接マスターへ）
      const dryGain = audienceCtx.createGain();
      dryGain.gain.value = 0.28;

      src.connect(pan);
      pan.connect(wetGain); wetGain.connect(audienceReverb);
      pan.connect(dryGain); dryGain.connect(audienceMaster);

      const cell = feedCells.get(broadcasterId);
      if (cell) cell.audioNodes = { src, pan, wetGain, dryGain };

      console.log(`[audio] ${broadcasterId.slice(-4)} グラニュラー接続 pan=${pan.pan.value.toFixed(2)}`);
    } catch (e) {
      console.warn('[audio] connectGranularTrack:', e);
    }
  }

  // 担ぎ手の数と順番からパン位置を計算（-0.7 ～ +0.7）
  function calcPan(broadcasterId) {
    const keys = Array.from(feedCells.keys());
    const idx  = keys.indexOf(broadcasterId);
    const n    = keys.length;
    if (n <= 1) return 0;
    return ((idx / (n - 1)) * 2 - 1) * 0.7;
  }

  // レイアウト変更時にパンを再計算
  function recalcPanning() {
    const keys = Array.from(feedCells.keys());
    keys.forEach((bid, idx) => {
      const cell = feedCells.get(bid);
      if (cell?.audioNodes?.pan) {
        const pan = (keys.length <= 1) ? 0 : ((idx / (keys.length - 1)) * 2 - 1) * 0.7;
        cell.audioNodes.pan.pan.linearRampToValueAtTime(
          pan, audienceCtx.currentTime + 0.5
        );
      }
    });
  }

  // ============================================================
  //  音声初期化（ユーザータップ後）
  // ============================================================
  const audioTapEl = document.getElementById('audio-tap');
  audioTapEl.addEventListener('pointerdown', async () => {
    audioTapEl.classList.add('hidden');
    await initAudio();
  }, { once: true });

  async function initAudio() {
    audienceCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── ルーティング ───
    //   pad / bells → audienceReverb → audienceMaster → destination
    //   granularTrack → pan → wetGain → audienceReverb
    //                      → dryGain → audienceMaster
    audienceMaster = audienceCtx.createGain();
    audienceMaster.gain.value = 0.80;
    audienceMaster.connect(audienceCtx.destination);

    audienceComp = audienceCtx.createDynamicsCompressor();
    audienceComp.threshold.value = -14; audienceComp.ratio.value = 4;
    audienceComp.attack.value = 0.004; audienceComp.release.value = 0.2;
    audienceComp.connect(audienceMaster);

    audienceReverb   = createConvReverb(audienceCtx, 4.5, 3.2);
    reverbReturnGain = audienceCtx.createGain();
    reverbReturnGain.gain.value = 0.70;
    // reverb → reverbReturnGain → master（群衆エネルギーで wet 深さを変調）
    audienceReverb.connect(reverbReturnGain);
    reverbReturnGain.connect(audienceMaster);

    // ─── ギターアンプ 3チャンネル (L/C/R) — Oasis クランチ感 ───
    const guitarAmps = [
      makeGuitarAmp(audienceCtx, -0.7, 22),
      makeGuitarAmp(audienceCtx,  0.0, 28),
      makeGuitarAmp(audienceCtx,  0.7, 22),
    ];
    const guitarBus = audienceCtx.createGain(); guitarBus.gain.value = 0.42;
    guitarAmps.forEach(a => a.pan.connect(guitarBus));
    guitarBus.connect(audienceReverb);

    // ─── ベースアンプチェーン ───
    const bassAmp = audienceCtx.createGain(); bassAmp.gain.value = 1.0;
    const bassToneFilt = audienceCtx.createBiquadFilter();
    bassToneFilt.type = 'lowpass';
    bassToneFilt.frequency.value = 750;
    bassToneFilt.Q.value = 1.0;
    const bassBus = audienceCtx.createGain(); bassBus.gain.value = 0.55;
    bassAmp.connect(bassToneFilt);
    bassToneFilt.connect(bassBus);
    const bassDuck = audienceCtx.createGain(); bassDuck.gain.value = 1.0;
    bassBus.connect(bassDuck);
    bassDuck.connect(audienceComp);

    // ─── ドラムバス ───
    const drumBus = audienceCtx.createGain(); drumBus.gain.value = 0.55;
    drumBus.connect(audienceComp);

    // ─── サイドチェイン用 ダックゲイン (キックで一瞬下がる) ───
    const padDuck = audienceCtx.createGain(); padDuck.gain.value = 1.0;
    function duckSidechain(amount = 0.45, recoverMs = 200) {
      if (!audienceCtx) return;
      const t = audienceCtx.currentTime;
      [padDuck, bassDuck].forEach((g) => {
        g.gain.cancelScheduledValues(t);
        g.gain.setValueAtTime(g.gain.value, t);
        g.gain.linearRampToValueAtTime(amount, t + 0.010);
        g.gain.linearRampToValueAtTime(1.0,    t + recoverMs / 1000);
      });
    }

    // ─── 持続するコードパッド (進行に合わせて 4音をスムーズに移動) ───
    // padBus → padDuck (サイドチェイン) → 3 アンプチャンネル(分散送り)
    padBus = audienceCtx.createGain();
    padBus.gain.setValueAtTime(0, audienceCtx.currentTime);
    padBus.gain.linearRampToValueAtTime(0.16, audienceCtx.currentTime + 4.0);
    padBus.connect(padDuck);
    guitarAmps.forEach(a => padDuck.connect(a.inp));

    // 4声の sustained osc (root, 3rd, 5th, oct) — コード変化で周波数を ramp
    // 初期値は G コード
    const padOscs = [];
    const padDetunes = [0.997, 1.000, 1.003, 1.000];   // 互い違いのデチューン
    const padGains   = [0.32, 0.30, 0.30, 0.18];
    const padTypes   = ['sawtooth', 'sawtooth', 'sawtooth', 'triangle'];
    for (let i = 0; i < 4; i++) {
      const osc = audienceCtx.createOscillator();
      osc.type  = padTypes[i];
      osc.frequency.value = CHORDS.G.voicing[i] * padDetunes[i];
      const g   = audienceCtx.createGain(); g.gain.value = padGains[i];
      osc.connect(g); g.connect(padBus);
      osc.start();
      padOscs.push(osc);

      // ゆっくり LFO で揺らぎ
      const lfo = audienceCtx.createOscillator(); lfo.type = 'sine';
      lfo.frequency.value = 0.06 + i * 0.04;
      const dep = audienceCtx.createGain(); dep.gain.value = 0.04;
      lfo.connect(dep); dep.connect(g.gain);
      lfo.start();
    }

    // ─── コード進行タイマー (3秒ごとに次のコードへ ramp) ───
    let chordIdx = 0;
    let currentChord = CHORDS[_activeProgression[0]];
    function rampPadToChord(chord) {
      const t = audienceCtx.currentTime;
      padOscs.forEach((osc, i) => {
        const target = chord.voicing[i] * padDetunes[i];
        osc.frequency.linearRampToValueAtTime(target, t + 1.2);
      });
    }
    function nextChord() {
      chordIdx = (chordIdx + 1) % _activeProgression.length;
      currentChord = CHORDS[_activeProgression[chordIdx]];
      rampPadToChord(currentChord);
    }
    setInterval(nextChord, 3200);

    // ─── 環境ノイズ (アンプヒス) ───
    const envBuf = audienceCtx.createBuffer(1, audienceCtx.sampleRate * 4, audienceCtx.sampleRate);
    const ed = envBuf.getChannelData(0);
    for (let i = 0; i < ed.length; i++) ed[i] = Math.random() * 2 - 1;
    const envSrc  = audienceCtx.createBufferSource();
    envSrc.buffer = envBuf; envSrc.loop = true;
    const envFilt = audienceCtx.createBiquadFilter();
    envFilt.type  = 'bandpass'; envFilt.frequency.value = 1800; envFilt.Q.value = 0.7;
    const envGain = audienceCtx.createGain(); envGain.gain.value = 0.022;
    envSrc.connect(envFilt); envFilt.connect(envGain); envGain.connect(audienceReverb);
    envSrc.start();

    // ─── サブベースドローン (G1 = 49Hz、曲切替で他の音にも変化) ───
    const droneOsc = audienceCtx.createOscillator();
    droneOsc.type  = 'triangle';
    droneOsc.frequency.value = 49.00;
    const droneGain = audienceCtx.createGain(); droneGain.gain.value = 0.08;
    droneOsc.connect(droneGain); droneGain.connect(bassAmp);
    droneOsc.start();

    // ─── 曲切替: 進行 / 歪み量 / 音色 / トニックドローン更新 + 切替合図 ───
    function applySong(idx) {
      const song = SONGS[idx];
      _activeSongIdx     = idx;
      _activeProgression = song.progression;
      _activeDrive       = song.drive;
      _activeTone        = song.tone;
      const t = audienceCtx.currentTime;
      const offs = [-3, 0, -3];
      guitarAmps.forEach((amp, i) => {
        amp.dist.curve = makeDistortionCurve(song.drive + offs[i]);
        amp.tone.frequency.linearRampToValueAtTime(song.tone, t + 0.6);
      });
      droneOsc.frequency.linearRampToValueAtTime(song.tonic, t + 1.2);
      chordIdx = 0;
      currentChord = CHORDS[song.progression[0]];
      rampPadToChord(currentChord);
      // 切替の合図に大きめのクラッシュ
      hitCrash(audienceCtx, drumBus, 0.85);
      console.log('[song]', idx, song.name);
    }
    // socket リスナーから呼べるように参照を公開
    _audApplySong = applySong;
    // 接続時にサーバーから届いた _pendingSongIdx で初期化
    applySong(_pendingSongIdx);

    // ─── ドラムループ (担ぎ手がいるとき疎にビート) ───
    let drumBeat = 0;
    function drumLoop() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      const move   = Math.min(world.totalMovement / 4, 1);

      // 担ぎ手が居ない時はスローパルス。居る時は普通のロックビート (4/4 を遅め)
      if (world.mikoshiCount > 0) {
        drumBeat++;
        const vel = 0.32 + energy * 0.45 + move * 0.20;

        // キック (アタマ) + サイドチェイン発火
        hitKick(audienceCtx, drumBus, vel * 0.85);
        duckSidechain();

        // バックビート (2拍目)
        const beatMs = world.mikoshiCount > 0 ? Math.max(220, 600 - energy * 200 - move * 100) : 1200;
        setTimeout(() => hitSnare(audienceCtx, drumBus, vel * 0.7), beatMs | 0);

        // ハイハット 8分
        for (let s = 0; s < 4; s++) {
          setTimeout(() => hitHihat(audienceCtx, drumBus, vel * 0.45), (beatMs * s / 2) | 0);
        }

        // クラッシュ: 4拍周期
        if (drumBeat % 4 === 0 && Math.random() < 0.55) {
          hitCrash(audienceCtx, drumBus, vel * 0.5);
        }

        // 終端で力強い盛り上がり時のフィル
        if (energy > 0.55 && Math.random() < 0.30) {
          setTimeout(() => hitSnare(audienceCtx, drumBus, vel * 0.5), beatMs * 1.6 | 0);
        }

        const gap = beatMs * 2 + Math.random() * 200;
        setTimeout(drumLoop, gap | 0);
      } else {
        // 担ぎ手なし: 静かに散発キック
        if (Math.random() < 0.25) {
          hitKick(audienceCtx, drumBus, 0.20);
          duckSidechain(0.65, 220);   // 軽めのダック
        }
        setTimeout(drumLoop, 4000 + Math.random() * 3000);
      }
    }
    drumLoop();

    // ─── ベースライン (現在コードの bassNotes を順に踏む) ───
    let bassStep = 0;
    function bassLoop() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      if (world.mikoshiCount > 0) {
        const move = Math.min(world.totalMovement / 4, 1);
        const vel  = 0.30 + energy * 0.30 + move * 0.20;
        const notes = currentChord.bassNotes;
        const f = notes[bassStep % notes.length];
        bassStep++;
        playBass(audienceCtx, bassAmp, f, vel, 0.40);
        const gap = Math.max(220, 520 - energy * 160 - move * 100) + Math.random() * 180;
        setTimeout(bassLoop, gap | 0);
      } else {
        setTimeout(bassLoop, 2800);
      }
    }
    bassLoop();

    // ─── ギターリード(コードトーンに寄り添う、フレーズで休符を入れる) ───
    let leadStep = 0;
    let leadPhraseRemaining = 0;
    function leadLoop() {
      if (!audienceCtx) return;
      const energy = world.avgAudienceEnergy || 0;
      const move   = Math.min(world.totalMovement / 4, 1);

      let isResting = false;
      if (world.mikoshiCount > 0) {
        if (leadPhraseRemaining <= 0) {
          // 休符明け: 新フレーズ開始 (1〜3音)
          leadPhraseRemaining = 1 + Math.floor(Math.random() * (1.5 + energy * 1.5));
          leadStep = Math.floor(Math.random() * 3);   // コードトーンに着地
        } else if (Math.random() < 0.7) {
          leadStep += Math.random() < 0.55 ? 1 : -1;
          leadStep = Math.max(0, Math.min(currentChord.lead.length - 1, leadStep));
        }
        const f = currentChord.lead[leadStep];
        const isLast = leadPhraseRemaining === 1;
        const dur = isLast ? 1.2 + Math.random() * 0.6 : 0.5 + Math.random() * 0.3;
        const vel = 0.30 + energy * 0.30;
        pickGuitar(audienceCtx, guitarAmps, f, vel, dur);
        leadPhraseRemaining--;
        isResting = leadPhraseRemaining <= 0;
      }

      const gap = world.mikoshiCount > 0
        ? (isResting
            ? 1400 + Math.random() * 1600        // フレーズ間の休符
            : 320 + Math.random() * 280)         // フレーズ内
        : 4500 + Math.random() * 3000;
      setTimeout(leadLoop, gap | 0);
    }
    leadLoop();

    audioReady = true;

    // 音声初期化前に届いていたトラックを接続
    for (const [bid, track] of pendingAudioTracks) {
      connectGranularTrack(track, bid);
    }
    pendingAudioTracks.clear();

    // ─── 観客マイク検出（任意：拒否されても動作継続） ───
    try {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false },
        video: false,
      });
      audienceMicAnalyser = audienceCtx.createAnalyser();
      audienceMicAnalyser.fftSize = 256;
      audienceMicAnalyser.smoothingTimeConstant = 0.35;
      audienceCtx.createMediaStreamSource(micStream).connect(audienceMicAnalyser);
      audienceMicBuf = new Uint8Array(audienceMicAnalyser.frequencyBinCount);
      console.log('[audience] マイク検出有効');
    } catch (e) {
      console.log('[audience] マイク無効（検出なしで継続）:', e.message);
    }
    startCrowdLoop();
  }

  // ============================================================
  //  観客マイク解析 — 歓声・拍手スコアを 0-1 で返す
  // ============================================================
  function analyzeCrowd() {
    if (!audienceMicAnalyser || !audienceMicBuf) return 0;
    audienceMicAnalyser.getByteFrequencyData(audienceMicBuf);

    const n         = audienceMicBuf.length;
    const hzPerBin  = (audienceCtx.sampleRate / 2) / n;
    let total = 0, midSum = 0, highSum = 0, midN = 0, highN = 0;

    for (let i = 0; i < n; i++) {
      const hz = i * hzPerBin;
      const v  = audienceMicBuf[i] / 255;
      total += v;
      if (hz >= 300 && hz < 2500) { midSum  += v; midN++;  }  // 声域
      if (hz >= 2500)              { highSum += v; highN++; }  // 拍手・歓声の倍音
    }

    const overall = total / n;
    const mid  = midN  > 0 ? midSum  / midN  : 0;
    const high = highN > 0 ? highSum / highN : 0;

    // 声 0.45 + 拍手高域 0.30 + 全体 0.25 の加重和
    const score = overall * 0.25 + mid * 0.45 + high * 0.30;
    return Math.min(1, score * 4.2);
  }

  // ============================================================
  //  群衆ループ — 毎フレーム解析 → 音響反映 → サーバーへ送信
  // ============================================================
  function startCrowdLoop() {
    const tick = () => {
      if (!audioReady || !audienceCtx) { requestAnimationFrame(tick); return; }

      const raw = analyzeCrowd();
      // 盛り上がりは素早く上昇、落ち着きは緩やかに（拍手の歯切れを残す）
      const rate = raw > crowdExcitement ? 0.08 : 0.022;
      crowdExcitement = lerp(crowdExcitement, raw, rate);

      const t  = audienceCtx.currentTime;
      const ce = crowdExcitement;

      // リバーブリターンゲイン（観客が湧くと空間が広がる感覚）
      if (reverbReturnGain) {
        reverbReturnGain.gain.linearRampToValueAtTime(
          0.60 + ce * 0.55, t + 0.35
        );
      }

      // パッド音量（観客の声に呼応して膨らむ）
      if (padBus && world.mikoshiCount > 0) {
        padBus.gain.linearRampToValueAtTime(
          0.10 + ce * 0.22, t + 0.5
        );
      }

      // マスターゲイン
      if (audienceMaster) {
        audienceMaster.gain.linearRampToValueAtTime(
          0.72 + ce * 0.18, t + 0.4
        );
      }

      // サーバーへ 200ms 間隔で送信
      const now = performance.now();
      if (now - _lastEnergyEmit > 200) {
        _lastEnergyEmit = now;
        socket.emit('audience_energy', { level: Math.round(ce * 1000) / 1000 });
      }

      requestAnimationFrame(tick);
    };
    tick();
  }

  // ============================================================
  //  ワールドステート → 音響反映
  // ============================================================
  function applyWorldToAudio(s) {
    if (!audienceCtx || !audienceMaster) return;
    const move   = Math.min(s.totalMovement / 4, 1);
    const energy = Math.min(s.avgAudienceEnergy || 0, 1);
    const t      = audienceCtx.currentTime;

    // 担ぎ手がいない場合はパワーコードパッドをフェードダウン
    if (padBus) {
      const targetPad = s.mikoshiCount === 0
        ? 0.05
        : 0.18 + move * 0.10 + energy * 0.08;
      padBus.gain.linearRampToValueAtTime(targetPad, t + 2.5);
    }

    // 観客エネルギーで全体音量が上がる
    audienceMaster.gain.linearRampToValueAtTime(
      0.72 + energy * 0.18, t + 1.0
    );
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  // ============================================================
  //  エフェクト canvas（波紋）
  // ============================================================
  (function startFx() {
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    let W, H;
    const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const ripples = [];
    let lastRipple = 0;

    function loop() {
      requestAnimationFrame(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, 0, W, H);

      const { devices, totalMovement, avgBrightness, avgColorTemp } = world;
      const now = performance.now();
      const gap = Math.max(120, 750 - totalMovement * 60);

      if (devices.length > 0 && now - lastRipple > gap) {
        lastRipple = now;
        devices.forEach((d, i) => {
          const angle = (i / Math.max(devices.length, 1)) * Math.PI * 2;
          const cx    = W * 0.5 + Math.cos(angle) * W * 0.2;
          const cy    = H * 0.5 + Math.sin(angle) * H * 0.18;
          const hue   = avgColorTemp * 50 + 10;
          const maxR  = 90 + (d.accMagnitude || 0.2) * 260 + (d.micLevel || 0) * 100;
          ripples.push({ x: cx, y: cy, r: 5, maxR, alpha: 0.4, hue });
        });
      }
      if (devices.length === 0 && now - lastRipple > 3000) {
        lastRipple = now;
        ripples.push({ x: W * 0.5, y: H * 0.5, r: 5, maxR: 70, alpha: 0.3, hue: 210 });
      }

      const speed = 1.3 + totalMovement * 0.75;
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += speed; rp.alpha -= 0.004;
        if (rp.alpha <= 0 || rp.r > rp.maxR) { ripples.splice(i, 1); continue; }
        const prog = 1 - rp.r / rp.maxR;
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${rp.hue},85%,65%,${rp.alpha * prog})`;
        ctx.lineWidth   = 1.5 * prog * 2.5;
        ctx.stroke();
      }
      if (Math.random() < 0.06 * (0.5 + avgBrightness)) {
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${avgColorTemp * 40 + 20},70%,88%,${Math.random() * 0.3})`;
        ctx.fill();
      }
    }
    loop();
  })();
  </script>

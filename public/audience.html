<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>神輿サウンド – 観客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* 担ぎ手カメラ映像のコンテナ */
    #feeds { position: fixed; inset: 0; }

    /* 各映像セル（JSで位置・サイズを明示指定） */
    .feed-cell {
      position: absolute;
      overflow: hidden;
      background: #000;
    }
    .feed-cell video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .feed-cell video.visible { opacity: 1; }

    /* 担ぎ手ゼロ時 */
    #no-feed {
      position: fixed; inset: 0; z-index: 5;
      background: #080810;
      display: flex; align-items: center; justify-content: center;
      color: rgba(200,210,255,0.25);
      font-size: 0.75rem; letter-spacing: 0.3em;
      font-family: sans-serif;
      transition: opacity 0.8s;
    }
    #no-feed.hidden { opacity: 0; pointer-events: none; }

    /* エフェクト canvas */
    #fx {
      position: fixed; inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 10;
    }

    /* 音声開始用タップオーバーレイ */
    #audio-tap {
      position: fixed;
      bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 20;
      padding: 0.6rem 1.4rem;
      background: rgba(255,220,100,0.12);
      border: 1px solid rgba(255,220,100,0.25);
      border-radius: 999px;
      color: rgba(255,220,100,0.5);
      font-size: 0.7rem; letter-spacing: 0.25em;
      font-family: sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: blink 3s ease-in-out infinite;
    }
    #audio-tap.hidden { display: none; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  </style>
</head>
<body>
  <div id="feeds"></div>
  <div id="no-feed">神輿の接続を待っています…</div>
  <canvas id="fx"></canvas>
  <div id="audio-tap">タップして音声を有効化</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  四七抜き短音階 (D E G A C) 周波数テーブル
  // ============================================================
  const YO = [
    73.42, 82.41, 98.00, 110.00, 130.81,
    146.83, 164.81, 196.00, 220.00, 261.63,
    293.66, 329.63, 392.00, 440.00, 523.25,
    587.33, 659.26, 784.00,
  ];

  // ============================================================
  //  状態
  // ============================================================
  let world = {
    mikoshiCount: 0, audienceCount: 0,
    avgBrightness: 0.5, avgWhiteRatio: 0.3, avgColorTemp: 0.5,
    totalMovement: 0, maxMic: 0, devices: [],
  };

  const feedCells = new Map(); // broadcasterId → { cell, video, pc, audioNodes }
  let audioReady  = false;

  // Web Audio API グローバル
  let audienceCtx    = null;
  let audienceReverb = null;
  let audienceMaster = null;
  let audienceComp   = null;
  let padBus         = null;

  // 音声初期化前に届いた WebRTC 音声トラックをキュー
  const pendingAudioTracks = new Map(); // broadcasterId → MediaStreamTrack

  // ============================================================
  //  Socket.io
  // ============================================================
  const socket = io({ transports: ['websocket'] });

  socket.on('connect', () => {
    socket.emit('join_audience');
  });

  socket.on('world_state', (s) => {
    world = s;
    updateNoFeed(s.mikoshiCount);
    if (audioReady) applyWorldToAudio(s);
  });

  socket.on('broadcaster_arrived', ({ broadcasterId, voiceIndex }) => {
    console.log('[broadcaster_arrived]', broadcasterId);
    startViewing(broadcasterId, voiceIndex);
  });

  socket.on('broadcaster_left', ({ broadcasterId }) => {
    removeFeedCell(broadcasterId);
  });

  // ============================================================
  //  WebRTC: viewer（映像 + グラニュラー音声を受信）
  // ============================================================
  const ICE_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ],
  };

  async function startViewing(broadcasterId, voiceIndex) {
    const existing = feedCells.get(broadcasterId);
    if (existing?.pc) existing.pc.close();

    const pc = new RTCPeerConnection(ICE_CONFIG);
    ensureFeedCell(broadcasterId, voiceIndex, pc);

    // Pillar 2: 映像・音声トラックの振り分け受信
    pc.ontrack = (e) => {
      if (e.track.kind === 'video') {
        // 映像トラック → video要素に接続
        const cell = feedCells.get(broadcasterId);
        if (!cell) return;
        if (e.streams[0]) {
          cell.video.srcObject   = e.streams[0];
          cell.video.autoplay    = true;
          cell.video.muted       = true;
          cell.video.playsInline = true;
          cell.video.play().then(() => {
            cell.video.classList.add('visible');
            updateNoFeed(feedCells.size);
          }).catch(console.warn);
        }
      } else if (e.track.kind === 'audio') {
        // グラニュラー音声トラック → Web Audio API に接続
        if (audioReady && audienceCtx) {
          connectGranularTrack(e.track, broadcasterId);
        } else {
          pendingAudioTracks.set(broadcasterId, e.track);
        }
      }
    };

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice', { to: broadcasterId, ice: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      console.log(`[PC ${broadcasterId.slice(-4)}] ${pc.connectionState}`);
    };

    socket.emit('viewer_request', { broadcasterId });

    socket.once('offer', async ({ from, offer }) => {
      if (from !== broadcasterId) return;
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', { to: broadcasterId, answer });
    });

    socket.on('ice', ({ from, ice }) => {
      if (from !== broadcasterId) return;
      pc.addIceCandidate(new RTCIceCandidate(ice)).catch(() => {});
    });

    const cell = feedCells.get(broadcasterId);
    if (cell) cell.pc = pc;
  }

  // ============================================================
  //  映像セル管理
  // ============================================================
  const feedsEl = document.getElementById('feeds');

  function ensureFeedCell(broadcasterId, voiceIndex, pc) {
    if (feedCells.has(broadcasterId)) return;
    const cell  = document.createElement('div');
    cell.className = 'feed-cell';
    const video = document.createElement('video');
    video.muted = true; video.playsInline = true;
    cell.appendChild(video);
    feedsEl.appendChild(cell);
    feedCells.set(broadcasterId, { cell, video, pc: pc || null, audioNodes: null });
    layoutFeeds();
  }

  function removeFeedCell(broadcasterId) {
    const c = feedCells.get(broadcasterId);
    if (!c) return;
    if (c.pc) c.pc.close();
    // Web Audio ノードのクリーンアップ
    if (c.audioNodes) {
      ['src', 'pan', 'wetGain', 'dryGain'].forEach((k) => {
        try { c.audioNodes[k]?.disconnect(); } catch (_) {}
      });
    }
    c.video.classList.remove('visible');
    setTimeout(() => {
      try { c.cell.remove(); } catch (_) {}
      feedCells.delete(broadcasterId);
      layoutFeeds();
      updateNoFeed(feedCells.size);
    }, 700);
  }

  function layoutFeeds() {
    const cells = Array.from(feedCells.values());
    const n = cells.length;
    const W = window.innerWidth, H = window.innerHeight;
    cells.forEach((c, i) => {
      const s = c.cell.style;
      if (n === 1) {
        s.left = '0'; s.top = '0'; s.width = W+'px'; s.height = H+'px';
      } else if (n === 2) {
        s.left = (i * W/2)+'px'; s.top = '0'; s.width = (W/2)+'px'; s.height = H+'px';
      } else {
        s.left = ((i%2) * W/2)+'px'; s.top = (Math.floor(i/2) * H/2)+'px';
        s.width = (W/2)+'px'; s.height = (H/2)+'px';
      }
    });
    // パンニング位置を再計算
    if (audioReady) recalcPanning();
  }

  window.addEventListener('resize', layoutFeeds);

  function updateNoFeed(count) {
    document.getElementById('no-feed').classList.toggle('hidden', count > 0);
  }

  // 接続失敗セルの定期クリーンアップ
  setInterval(() => {
    for (const [id, c] of feedCells) {
      if (c.pc && (c.pc.connectionState === 'failed' || c.pc.connectionState === 'disconnected')) {
        removeFeedCell(id);
      }
    }
  }, 5000);

  // ============================================================
  //  Pillar 3: ピュア Web Audio API ユーティリティ
  // ============================================================

  // 合成インパルスレスポンスによるコンボリューションリバーブ
  function createConvReverb(ctx, duration, decay) {
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * duration);
    const ir  = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / (decay * 0.38));
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = ir;
    return conv;
  }

  // 鉦（非調和倍音）
  function hitKane(ctx, output, baseFreq) {
    const now    = ctx.currentTime;
    const ratios = [1, 2.76, 5.40, 8.93];
    const amps   = [1.0, 0.55, 0.28, 0.14];
    const decays = [2.5, 1.8, 1.2, 0.8];
    ratios.forEach((r, i) => {
      const osc = ctx.createOscillator();
      osc.type  = 'sine';
      osc.frequency.value = baseFreq * r;
      const g = ctx.createGain();
      g.gain.setValueAtTime(amps[i] * 0.25, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + decays[i]);
      osc.connect(g); g.connect(output);
      osc.start(now); osc.stop(now + decays[i] + 0.1);
    });
  }

  // ============================================================
  //  グラニュラー音声トラックを Web Audio API に接続
  //  （担ぎ手ごとに StereoPanner で空間配置）
  // ============================================================
  function connectGranularTrack(track, broadcasterId) {
    if (!audienceCtx || !audienceReverb || !audienceMaster) return;
    try {
      const stream = new MediaStream([track]);
      const src    = audienceCtx.createMediaStreamSource(stream);

      const pan = audienceCtx.createStereoPanner();
      pan.pan.value = calcPan(broadcasterId);

      // ウェット（リバーブ経由）
      const wetGain = audienceCtx.createGain();
      wetGain.gain.value = 0.55;
      // ドライ（直接マスターへ）
      const dryGain = audienceCtx.createGain();
      dryGain.gain.value = 0.28;

      src.connect(pan);
      pan.connect(wetGain); wetGain.connect(audienceReverb);
      pan.connect(dryGain); dryGain.connect(audienceMaster);

      const cell = feedCells.get(broadcasterId);
      if (cell) cell.audioNodes = { src, pan, wetGain, dryGain };

      console.log(`[audio] ${broadcasterId.slice(-4)} グラニュラー接続 pan=${pan.pan.value.toFixed(2)}`);
    } catch (e) {
      console.warn('[audio] connectGranularTrack:', e);
    }
  }

  // 担ぎ手の数と順番からパン位置を計算（-0.7 ～ +0.7）
  function calcPan(broadcasterId) {
    const keys = Array.from(feedCells.keys());
    const idx  = keys.indexOf(broadcasterId);
    const n    = keys.length;
    if (n <= 1) return 0;
    return ((idx / (n - 1)) * 2 - 1) * 0.7;
  }

  // レイアウト変更時にパンを再計算
  function recalcPanning() {
    const keys = Array.from(feedCells.keys());
    keys.forEach((bid, idx) => {
      const cell = feedCells.get(bid);
      if (cell?.audioNodes?.pan) {
        const pan = (keys.length <= 1) ? 0 : ((idx / (keys.length - 1)) * 2 - 1) * 0.7;
        cell.audioNodes.pan.pan.linearRampToValueAtTime(
          pan, audienceCtx.currentTime + 0.5
        );
      }
    });
  }

  // ============================================================
  //  音声初期化（ユーザータップ後）
  // ============================================================
  const audioTapEl = document.getElementById('audio-tap');
  audioTapEl.addEventListener('pointerdown', async () => {
    audioTapEl.classList.add('hidden');
    await initAudio();
  }, { once: true });

  async function initAudio() {
    audienceCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── ルーティング ───
    //   pad / bells → audienceReverb → audienceMaster → destination
    //   granularTrack → pan → wetGain → audienceReverb
    //                      → dryGain → audienceMaster
    audienceMaster = audienceCtx.createGain();
    audienceMaster.gain.value = 0.80;
    audienceMaster.connect(audienceCtx.destination);

    audienceComp = audienceCtx.createDynamicsCompressor();
    audienceComp.threshold.value = -14; audienceComp.ratio.value = 4;
    audienceComp.attack.value = 0.004; audienceComp.release.value = 0.2;
    audienceComp.connect(audienceMaster);

    audienceReverb = createConvReverb(audienceCtx, 4.5, 3.2);
    audienceReverb.connect(audienceMaster);

    // ─── アンビエントパッド（担ぎ手ごとに異なる和音） ───
    const aidx = parseInt(socket.id.slice(-4), 16) % 3;
    const chords = [
      [196.00, 293.66, 440.00],  // G3, D4, A4
      [220.00, 329.63, 523.25],  // A3, E4, C5
      [146.83, 220.00, 392.00],  // D3, A3, G4
    ];
    const freqs = chords[aidx];

    padBus = audienceCtx.createGain();
    padBus.gain.setValueAtTime(0, audienceCtx.currentTime);
    padBus.gain.linearRampToValueAtTime(0.16, audienceCtx.currentTime + 3.5);
    padBus.connect(audienceReverb);

    freqs.forEach((f, i) => {
      const osc = audienceCtx.createOscillator();
      osc.type  = 'sine';
      osc.frequency.value = f;

      // ゆっくりした振幅変調
      const modOsc   = audienceCtx.createOscillator();
      modOsc.type    = 'sine';
      modOsc.frequency.value = 0.025 + i * 0.018;
      const modDepth = audienceCtx.createGain();
      modDepth.gain.value = 0.22;

      const oscGain  = audienceCtx.createGain();
      oscGain.gain.value = 0.95 / freqs.length;

      modOsc.connect(modDepth);
      modDepth.connect(oscGain.gain);
      osc.connect(oscGain);
      oscGain.connect(padBus);
      osc.start(); modOsc.start();
    });

    // 環境ノイズテクスチャ（薄いざわめき）
    const envBuf = audienceCtx.createBuffer(1, audienceCtx.sampleRate * 4, audienceCtx.sampleRate);
    const ed = envBuf.getChannelData(0);
    for (let i = 0; i < ed.length; i++) ed[i] = Math.random() * 2 - 1;
    const envSrc  = audienceCtx.createBufferSource();
    envSrc.buffer = envBuf; envSrc.loop = true;
    const envFilt = audienceCtx.createBiquadFilter();
    envFilt.type  = 'bandpass'; envFilt.frequency.value = 600; envFilt.Q.value = 1.0;
    const envGain = audienceCtx.createGain(); envGain.gain.value = 0.04;
    envSrc.connect(envFilt); envFilt.connect(envGain); envGain.connect(audienceReverb);
    envSrc.start();

    // ─── 散発的な鉦（お囃子の間）───
    function ringBell() {
      const gap = world.mikoshiCount > 0
        ? 1000 + Math.random() * 2200
        : 4000 + Math.random() * 3000;
      setTimeout(() => {
        if (world.mikoshiCount > 0 && audienceCtx) {
          const kaneFreqs = [293.66, 329.63, 392.00, 440.00, 523.25];
          const bf = kaneFreqs[Math.floor(Math.random() * kaneFreqs.length)];
          hitKane(audienceCtx, audienceReverb, bf * (0.8 + world.avgColorTemp * 0.4));
        }
        ringBell();
      }, gap);
    }
    ringBell();

    audioReady = true;

    // 音声初期化前に届いていたトラックを接続
    for (const [bid, track] of pendingAudioTracks) {
      connectGranularTrack(track, bid);
    }
    pendingAudioTracks.clear();
  }

  // ============================================================
  //  ワールドステート → 音響反映
  // ============================================================
  function applyWorldToAudio(s) {
    if (!audienceCtx || !audienceMaster) return;
    const crowd = Math.min(s.mikoshiCount + s.audienceCount, 40) / 40;
    const move  = Math.min(s.totalMovement / 4, 1);
    const t     = audienceCtx.currentTime;

    // マスターゲイン（にぎわいに応じて）
    audienceMaster.gain.linearRampToValueAtTime(0.65 + crowd * 0.25, t + 1.5);

    // パッドの音量（担ぎ手がいないと徐々に消える）
    if (padBus) {
      const padVol = s.mikoshiCount > 0 ? 0.12 + move * 0.08 : 0.05;
      padBus.gain.linearRampToValueAtTime(padVol, t + 2.0);
    }
  }

  // ============================================================
  //  エフェクト canvas（波紋）
  // ============================================================
  (function startFx() {
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    let W, H;
    const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const ripples = [];
    let lastRipple = 0;

    function loop() {
      requestAnimationFrame(loop);
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, 0, W, H);

      const { devices, totalMovement, avgBrightness, avgColorTemp } = world;
      const now = performance.now();
      const gap = Math.max(120, 750 - totalMovement * 60);

      if (devices.length > 0 && now - lastRipple > gap) {
        lastRipple = now;
        devices.forEach((d, i) => {
          const angle = (i / Math.max(devices.length, 1)) * Math.PI * 2;
          const cx    = W * 0.5 + Math.cos(angle) * W * 0.2;
          const cy    = H * 0.5 + Math.sin(angle) * H * 0.18;
          const hue   = avgColorTemp * 50 + 10;
          const maxR  = 90 + (d.accMagnitude || 0.2) * 260 + (d.micLevel || 0) * 100;
          ripples.push({ x: cx, y: cy, r: 5, maxR, alpha: 0.4, hue });
        });
      }
      if (devices.length === 0 && now - lastRipple > 3000) {
        lastRipple = now;
        ripples.push({ x: W * 0.5, y: H * 0.5, r: 5, maxR: 70, alpha: 0.3, hue: 210 });
      }

      const speed = 1.3 + totalMovement * 0.75;
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += speed; rp.alpha -= 0.004;
        if (rp.alpha <= 0 || rp.r > rp.maxR) { ripples.splice(i, 1); continue; }
        const prog = 1 - rp.r / rp.maxR;
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${rp.hue},85%,65%,${rp.alpha * prog})`;
        ctx.lineWidth   = 1.5 * prog * 2.5;
        ctx.stroke();
      }
      if (Math.random() < 0.06 * (0.5 + avgBrightness)) {
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${avgColorTemp * 40 + 20},70%,88%,${Math.random() * 0.3})`;
        ctx.fill();
      }
    }
    loop();
  })();
  </script>
</body>
</html>
